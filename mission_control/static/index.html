<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000000;
  --tile: #1c1c1e;
  --tile-border: rgba(255,255,255,0.06);
  --tile-shadow: 0 2px 12px rgba(0,0,0,0.4);
  --text: #ffffff;
  --text-secondary: rgba(255,255,255,0.6);
  --text-muted: rgba(255,255,255,0.35);
  --green: #30d158;
  --red: #ff453a;
  --orange: #ff9f0a;
  --blue: #0a84ff;
  --purple: #bf5af2;
  --yellow: #ffd60a;
  --radius-tile: 16px;
  --radius-inner: 10px;
  --gap: 12px;
  --topbar: 44px;
  --font: -apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif;
  --mono: 'SF Mono', 'JetBrains Mono', monospace;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Topbar ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar);
  background: var(--bg);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 100;
}

#topbar-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

#topbar-logo {
  width: 24px;
  height: 24px;
  color: var(--green);
  flex-shrink: 0;
}

#topbar-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
}

#topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

#clock {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
}

#ws-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--red);
  transition: background 0.3s;
  flex-shrink: 0;
}
#ws-dot.connected { background: var(--green); }

/* ── Grid ── */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: var(--gap);
  padding: calc(var(--topbar) + 16px) 24px 48px;
}

/* ── Tile ── */
.tile {
  background: var(--tile);
  border-radius: var(--radius-tile);
  border: 1px solid var(--tile-border);
  box-shadow: var(--tile-shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-height: 300px;
}

.tile-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 6px;
  flex-shrink: 0;
}

.tile-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.tile-badge {
  font-size: 10px;
  font-weight: 600;
  font-family: var(--mono);
  background: rgba(255,255,255,0.08);
  color: var(--text-secondary);
  padding: 1px 6px;
  border-radius: 20px;
  white-space: nowrap;
}
.tile-badge.green { background: rgba(48,209,88,0.15); color: var(--green); }
.tile-badge.red { background: rgba(255,69,58,0.15); color: var(--red); }
.tile-badge.blue { background: rgba(10,132,255,0.15); color: var(--blue); }

.tile-body {
  flex: 1;
  overflow-y: auto;
  padding: 0 14px 12px;
  scrollbar-width: none;
}
.tile-body::-webkit-scrollbar { display: none; }

/* ── Empty state ── */
.empty {
  font-size: 11px;
  color: var(--text-muted);
  padding: 8px 0;
}

/* ── Service Health ── */
#services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px 6px;
}

.svc-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 6px;
  background: rgba(255,255,255,0.04);
  border-radius: 7px;
  min-width: 0;
}

.svc-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.svc-info {
  min-width: 0;
  flex: 1;
}

.svc-name {
  font-size: 10px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  display: block;
  line-height: 1.2;
}

.svc-port {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-muted);
  display: block;
  line-height: 1.2;
}

/* ── Trading ── */
.trading-hero {

}
.trading-hero.pos { color: var(--green); }
.trading-hero.neg { color: var(--red); }

.trading-mini-stats {

}

.trading-mini-stats span {

}

.trading-mini-stats .sep {

}

.chart-wrap {
  height: 120px;

}

/* ── Email ── */
.email-row {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  min-height: 32px;
}
.email-row:last-child { border-bottom: none; }

.email-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
}

.email-content { flex: 1; min-width: 0; }

.email-from {
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  display: block;
}

.email-subject {
  font-size: 10px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}

.email-time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;

/* ── Calendar ── */

  align-items: flex-start;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  min-height: 36px;

.cal-row:last-child { border-bottom: none; }

.cal-time {

  white-space: nowrap;
  flex-shrink: 0;

}

.cal-bar {
  width: 3px;

  border-radius: 2px;
  flex-shrink: 0;
  align-self: stretch;
}

.cal-info { flex: 1; min-width: 0; }

.cal-title {
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}

.cal-location {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}

/* ── Follow-ups ── */
.fu-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  min-height: 32px;
}
.fu-row:last-child { border-bottom: none; }

.fu-dot {
  width: 4px;

}

.fu-text {
  font-size: 11px;
  font-weight: 500;

.fu-due {

  color: var(--text-muted);
  white-space: nowrap;

/* ── System ── */
.sys-bars { margin-bottom: 10px; }

.sys-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;

.sys-bar-label {

.sys-bar-pct {

  color: var(--text-secondary);

  flex-shrink: 0;
}

.sys-divider {

  background: rgba(255,255,255,0.06);

}

.employees-grid {

  grid-template-columns: repeat(2, 1fr);

.emp-card {

  min-width: 0;

.emp-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;

.emp-info { min-width: 0; flex: 1; }

.emp-name {
  font-size: 10px;

  text-overflow: ellipsis;
}

.emp-task {
  font-size: 9px;
  color: var(--text-muted);
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sys-stats {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}

.sys-stat {
  font-size: 10px;
  color: var(--text-muted);
}

  color: var(--text-secondary);
  font-weight: 600;
}

/* ── Event Strip ── */
#event-strip {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 28px;
  background: var(--bg);
  border-top: 1px solid rgba(255,255,255,0.08);

.event-item {

  align-items: center;

}

.event-item .event-who {

  font-weight: 600;
}

.event-item .event-ts {
  color: var(--text-muted);
  margin-left: 4px;
}

@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Mobile ── */
@media (max-width: 600px) {
  #grid {
    grid-template-columns: 1fr;
    padding: calc(var(--topbar) + 12px) 12px 24px;
    gap: 10px;
  }
  #clock { display: none; }
  #event-strip { display: none; }
  .tile { max-height: none; }
}

/* ── Loading skeleton ── */
.skeleton {
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 6px;
  height: 12px;
  margin: 4px 0;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
</style>

<script>
'use strict';

// ── Utils ──────────────────────────────────────────────────────────────────

function esc(str) {
  const d = document.createElement('div');
  d.textContent = String(str ?? '');
  return d.innerHTML;
}

function setTextContent(el, value) {
  if (el) el.textContent = String(value ?? '');
}

function formatTime(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Denver' });
  } catch { return ''; }
}

function formatRelative(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    const now = Date.now();
    const diff = now - d.getTime();
    if (diff < 60000) return 'now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
    return Math.floor(diff / 86400000) + 'd';
  } catch { return ''; }
}

function formatDuration(start, end) {
  try {
    const s = new Date(start);
    const e = new Date(end);
    const sStr = s.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Denver' });
    const eStr = e.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Denver' });
    return sStr.replace(':00', '').replace(' ', '') + '–' + eStr.replace(':00', '').replace(' ', '');
  } catch { return formatTime(start); }
}

function formatMoney(n) {
  if (n === null || n === undefined) return '$0.00';
  const abs = Math.abs(n);
  return '$' + abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function barColor(pct) {
  if (pct < 65) return 'var(--green)';
  if (pct < 85) return 'var(--orange)';
  return 'var(--red)';
}

// ── Clock ─────────────────────────────────────────────────────────────────

const clockEl = document.getElementById('clock');
function updateClock() {
  const now = new Date();
  const str = now.toLocaleTimeString('en-US', {
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false, timeZone: 'America/Denver'
  });
  clockEl.textContent = str;
}
updateClock();
setInterval(updateClock, 1000);

// ── WebSocket ──────────────────────────────────────────────────────────────

const wsDot = document.getElementById('ws-dot');
let wsRetryDelay = 1000;
let wsInstance = null;
let wsConnected = false;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = proto + '//' + location.host + '/ws';
  try {
    wsInstance = new WebSocket(url);
  } catch (e) {
    scheduleWSReconnect();
    return;
  }

  wsInstance.addEventListener('open', () => {
    wsConnected = true;
    wsDot.classList.add('connected');
    wsDot.title = 'WebSocket connected';
    wsRetryDelay = 1000;
  });

  wsInstance.addEventListener('message', (ev) => {
    try {
      const data = JSON.parse(ev.data);
      handleWSMessage(data);
    } catch {}
  });

  wsInstance.addEventListener('close', () => {
    wsConnected = false;
    wsDot.classList.remove('connected');
    wsDot.title = 'WebSocket disconnected';
    scheduleWSReconnect();
  });

  wsInstance.addEventListener('error', () => {
    wsInstance.close();
  });
}

function scheduleWSReconnect() {
  setTimeout(() => {
    wsRetryDelay = Math.min(wsRetryDelay * 2, 30000);
    connectWS();
  }, wsRetryDelay);
}

// Event strip management
const MAX_EVENTS = 20;
const eventItems = document.getElementById('event-items');
let eventQueue = [];

function handleWSMessage(data) {
  // Update employee status if present
  if (data.employee && data.event_type) {
    updateEmployeeFromWS(data.employee, data.event_type, data.title);
  }

  // Add to event strip
  const item = {
    employee: data.employee || '',
    title: data.title || data.event_type || JSON.stringify(data),
    timestamp: data.timestamp || new Date().toISOString()
  };
  eventQueue.unshift(item);
  if (eventQueue.length > MAX_EVENTS) eventQueue.pop();
  renderEventStrip();
}

function renderEventStrip() {
  if (eventQueue.length === 0) return;
  eventItems.innerHTML = '';
  // Show up to 5 visible
  const visible = eventQueue.slice(0, 5);
  visible.forEach(ev => {
    const span = document.createElement('span');
    span.className = 'event-item';
    const who = document.createElement('span');
    who.className = 'event-who';
    who.textContent = ev.employee || 'system';
    span.appendChild(who);
    span.append(' ' + (ev.title || ''));
    const ts = document.createElement('span');
    ts.className = 'event-ts';
    ts.textContent = formatRelative(ev.timestamp);
    span.appendChild(ts);
    eventItems.appendChild(span);
  });
}

let employeeStatusOverrides = {};
function updateEmployeeFromWS(name, status, task) {
  employeeStatusOverrides[name.toLowerCase()] = { status, task };

}

// ── Service Health ─────────────────────────────────────────────────────────

async function fetchServices() {
  try {
    const res = await fetch('/api/services');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderServices(data);
  } catch (e) {
    renderServicesError();
  }
}

function renderServices(data) {
  const services = data.services || [];
  const total = data.total || services.length;
  const healthy = data.healthy || services.filter(s => s.status === 'healthy').length;

  const badge = document.getElementById('svc-badge');
  badge.textContent = healthy + '/' + total;
  badge.className = 'tile-badge ' + (healthy === total ? 'green' : healthy < total * 0.5 ? 'red' : '');

  const grid = document.getElementById('services-grid');
  grid.innerHTML = '';
  services.forEach(svc => {
    const pill = document.createElement('div');
    pill.className = 'svc-pill';

    const dot = document.createElement('div');
    dot.className = 'svc-dot';
    dot.style.background = svc.status === 'healthy' ? 'var(--green)'
      : svc.status === 'degraded' ? 'var(--orange)' : 'var(--red)';

    const info = document.createElement('div');
    info.className = 'svc-info';

    const name = document.createElement('span');
    name.className = 'svc-name';
    name.textContent = svc.name || '';

    const port = document.createElement('span');
    port.className = 'svc-port';
    port.textContent = svc.port ? ':' + svc.port : '';

    info.appendChild(name);
    info.appendChild(port);
    pill.appendChild(dot);
    pill.appendChild(info);
    grid.appendChild(pill);
  });
}

function renderServicesError() {
  document.getElementById('svc-badge').textContent = '—';
  document.getElementById('services-grid').innerHTML = '<span class="empty">Unable to load services</span>';
}

// ── Trading P&L ────────────────────────────────────────────────────────────

let tradingChart = null;

async function fetchTrading() {
  try {
    const res = await fetch('/api/trading/categories');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderTrading(data);
  } catch (e) {
    renderTradingError();
  }
}

function renderTrading(data) {
  const summary = data.summary || {};
  const categories = data.categories || {};

  const netPnl = summary.net_pnl ?? 0;
  const activityCount = summary.activity_count ?? summary.total_trades ?? 0;

  const hero = document.getElementById('trading-hero');
  hero.className = 'trading-hero ' + (netPnl >= 0 ? 'pos' : 'neg');
  hero.textContent = (netPnl >= 0 ? '+' : '-') + formatMoney(netPnl);

  document.getElementById('trading-badge').textContent = activityCount + ' trades';

  const mini = document.getElementById('trading-mini');
  mini.innerHTML = '';
  const stats = [
    ['Deployed', formatMoney(summary.estimated_deposits ?? 0)],
    ['Returned', formatMoney(summary.total_returned ?? 0)],
    ['Open', formatMoney(summary.open_value ?? 0)]
  ];
  stats.forEach(([label, val], i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = '|';
      mini.appendChild(sep);
    }
    const s = document.createElement('span');
    s.textContent = label + ' ' + val;
    mini.appendChild(s);
  });

  // Chart
  const catKeys = Object.keys(categories);
  const chartLabels = catKeys.map(k => k.charAt(0).toUpperCase() + k.slice(1));
  const chartData = catKeys.map(k => categories[k].total_pnl ?? 0);
  const chartColors = chartData.map(v => v >= 0 ? 'rgba(48,209,88,0.75)' : 'rgba(255,69,58,0.75)');
  const chartBorderColors = chartData.map(v => v >= 0 ? 'var(--green)' : 'var(--red)');

  const ctx = document.getElementById('trading-chart').getContext('2d');
  if (tradingChart) {
    tradingChart.data.labels = chartLabels;
    tradingChart.data.datasets[0].data = chartData;
    tradingChart.data.datasets[0].backgroundColor = chartColors;
    tradingChart.data.datasets[0].borderColor = chartBorderColors;
    tradingChart.update();
  } else {
    tradingChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: chartLabels,
        datasets: [{
          data: chartData,
          backgroundColor: chartColors,
          borderColor: chartBorderColors,
          borderWidth: 1,
          borderRadius: 4,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const v = ctx.parsed.x;
                return (v >= 0 ? '+' : '') + '$' + v.toFixed(2);
              }
            },
            backgroundColor: '#2c2c2e',
            titleColor: 'rgba(255,255,255,0.8)',
            bodyColor: 'rgba(255,255,255,0.6)',
            borderColor: 'rgba(255,255,255,0.1)',
            borderWidth: 1,
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
            ticks: {
              color: 'rgba(255,255,255,0.4)',
              font: { size: 9, family: "'SF Mono', monospace" },
              callback: v => '$' + v
            },
            border: { display: false }
          },
          y: {
            grid: { display: false, drawBorder: false },
            ticks: {
              color: 'rgba(255,255,255,0.6)',
              font: { size: 9 },
            },
            border: { display: false }
          }
        }
      }
    });
  }
}

function renderTradingError() {
  document.getElementById('trading-hero').textContent = '—';
  document.getElementById('trading-badge').textContent = '—';
  document.getElementById('trading-mini').textContent = 'Unable to load';
}

// ── Email ──────────────────────────────────────────────────────────────────

async function fetchEmails() {
  const body = document.getElementById('email-body');
  const badge = document.getElementById('email-badge');
  try {
    const res = await fetch('/api/emails');
    if (res.status === 404) {
      body.innerHTML = '<span class="empty">No recent emails</span>';
      badge.textContent = '0';
      return;
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const emails = data.emails || [];
    const unread = emails.filter(e => !e.read).length;
    badge.textContent = unread > 0 ? unread + ' unread' : emails.length;
    badge.className = 'tile-badge ' + (unread > 0 ? 'blue' : '');

    if (emails.length === 0) {
      body.innerHTML = '<span class="empty">No recent emails</span>';
      return;
    }
    body.innerHTML = '';
    emails.slice(0, 8).forEach(email => {
      const row = document.createElement('div');
      row.className = 'email-row';

      const dot = document.createElement('div');
      dot.className = 'email-dot';
      dot.style.background = email.flagged ? 'var(--orange)'
        : !email.read ? 'var(--blue)' : 'rgba(255,255,255,0.25)';

      const content = document.createElement('div');
      content.className = 'email-content';

      const from = document.createElement('span');
      from.className = 'email-from';
      from.textContent = email.from || '';

      const subject = document.createElement('span');
      subject.className = 'email-subject';
      subject.textContent = email.subject || '';

      content.appendChild(from);
      content.appendChild(subject);

      const time = document.createElement('span');
      time.className = 'email-time';
      time.textContent = formatRelative(email.received_at);

      row.appendChild(dot);
      row.appendChild(content);
      row.appendChild(time);
      body.appendChild(row);
    });
  } catch (e) {
    body.innerHTML = '<span class="empty">No recent emails</span>';
    badge.textContent = '—';
  }
}

// ── Calendar ───────────────────────────────────────────────────────────────

const CAL_COLORS = ['var(--blue)', 'var(--purple)', 'var(--orange)', 'var(--green)', 'var(--yellow)'];

async function fetchCalendar() {
  const body = document.getElementById('cal-body');
  const badge = document.getElementById('cal-badge');
  try {
    const res = await fetch('/api/calendar');
    if (res.status === 404) {
      body.innerHTML = '<span class="empty">No events today</span>';
      badge.textContent = '0';
      return;
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const events = data.events || [];
    badge.textContent = events.length;

    if (events.length === 0) {
      body.innerHTML = '<span class="empty">No events today</span>';
      return;
    }
    body.innerHTML = '';
    events.slice(0, 6).forEach((ev, i) => {
      const row = document.createElement('div');
      row.className = 'cal-row';

      const time = document.createElement('div');
      time.className = 'cal-time';
      time.textContent = formatTime(ev.start);

      const bar = document.createElement('div');
      bar.className = 'cal-bar';
      bar.style.background = CAL_COLORS[i % CAL_COLORS.length];

      const info = document.createElement('div');
      info.className = 'cal-info';

      const title = document.createElement('span');
      title.className = 'cal-title';
      title.textContent = ev.title || '';

      const loc = document.createElement('span');
      loc.className = 'cal-location';
      loc.textContent = ev.location || formatDuration(ev.start, ev.end);

      info.appendChild(title);
      info.appendChild(loc);
      row.appendChild(time);
      row.appendChild(bar);
      row.appendChild(info);
      body.appendChild(row);
    });
  } catch (e) {
    body.innerHTML = '<span class="empty">No events today</span>';
    badge.textContent = '—';
  }
}

// ── Follow-ups ─────────────────────────────────────────────────────────────

async function fetchFollowups() {
  const body = document.getElementById('fu-body');
  const badge = document.getElementById('fu-badge');
  try {
    const res = await fetch('/api/followups');
    if (res.status === 404) {
      body.innerHTML = '<span class="empty">No pending items</span>';
      badge.textContent = '0';
      return;
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    let followups = data.followups || [];

    // Sort: high priority first, then overdue
    const priorityOrder = { high: 0, medium: 1, low: 2 };
    followups.sort((a, b) => {
      if (a.overdue && !b.overdue) return -1;
      if (!a.overdue && b.overdue) return 1;
      return (priorityOrder[a.priority] ?? 1) - (priorityOrder[b.priority] ?? 1);
    });

    const overdue = followups.filter(f => f.overdue).length;
    badge.textContent = overdue > 0 ? overdue + ' overdue' : followups.length;
    badge.className = 'tile-badge ' + (overdue > 0 ? 'red' : '');

    if (followups.length === 0) {
      body.innerHTML = '<span class="empty">No pending items</span>';
      return;
    }
    body.innerHTML = '';
    followups.slice(0, 8).forEach(fu => {
      const row = document.createElement('div');
      row.className = 'fu-row';

      const dot = document.createElement('div');
      dot.className = 'fu-dot';
      dot.style.background = fu.priority === 'high' ? 'var(--red)'
        : fu.priority === 'medium' ? 'var(--orange)' : 'rgba(255,255,255,0.25)';

      const text = document.createElement('span');
      text.className = 'fu-text';
      text.textContent = fu.title || '';

      const due = document.createElement('span');
      due.className = 'fu-due' + (fu.overdue ? ' overdue' : '');
      due.textContent = fu.due ? formatRelative(fu.due) : '';

      row.appendChild(dot);
      row.appendChild(text);
      row.appendChild(due);
      body.appendChild(row);
    });
  } catch (e) {
    body.innerHTML = '<span class="empty">No pending items</span>';
    badge.textContent = '—';
  }
}

// ── System ─────────────────────────────────────────────────────────────────

let lastStatusData = null;

function renderBar(id, label, pct) {
  pct = Math.min(100, Math.max(0, pct || 0));
  const color = barColor(pct);
  return `<div class="sys-bar-row">
    <span class="sys-bar-label">${label}</span>
    <div class="sys-bar-track">
      <div class="sys-bar-fill" style="width:${pct}%;background:${color}"></div>
    </div>
    <span class="sys-bar-pct">${Math.round(pct)}%</span>
  </div>`;
}

async function fetchSystem() {
  try {
    const res = await fetch('/status');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    lastStatusData = data;
    renderSystem(data);
  } catch (e) {
    renderSystemError();
  }
}

function renderSystem(data) {
  const employees = data.employees || {};
  const stats = data.stats_24h || {};
  const connections = data.connections ?? 0;

  // Determine first employee as "boss" for badge
  const empNames = Object.keys(employees);
  const badgeName = empNames[0] ? (empNames[0].charAt(0).toUpperCase() + empNames[0].slice(1)) : '—';
  document.getElementById('sys-badge').textContent = badgeName;

  // System bars - pull from stats or employees data
  const cpu = stats.cpu_pct ?? stats.cpu ?? null;
  const mem = stats.mem_pct ?? stats.memory ?? null;
  const disk = stats.disk_pct ?? stats.disk ?? null;

  const barsEl = document.getElementById('sys-bars');
  let barsHTML = '';
  if (cpu !== null) barsHTML += renderBar('cpu', 'CPU', cpu);
  if (mem !== null) barsHTML += renderBar('mem', 'Mem', mem);
  if (disk !== null) barsHTML += renderBar('disk', 'Disk', disk);
  if (!barsHTML) {
    barsHTML = '<span class="empty">No system metrics</span>';
  }
  barsEl.innerHTML = barsHTML;

  renderEmployees(data);

  // Stats row
  const statsEl = document.getElementById('sys-stats');
  statsEl.innerHTML = '';
  const s1 = document.createElement('span');
  s1.className = 'sys-stat';
  s1.innerHTML = 'WS <strong>' + connections + '</strong>';
  statsEl.appendChild(s1);

  if (stats.total_trades != null) {
    const s2 = document.createElement('span');
    s2.className = 'sys-stat';
    s2.innerHTML = '24h trades <strong>' + stats.total_trades + '</strong>';
    statsEl.appendChild(s2);
  }
}

function renderEmployees(data) {
  if (!data) return;
  const employees = data.employees || {};
  const grid = document.getElementById('employees-grid');
  grid.innerHTML = '';
  Object.entries(employees).forEach(([name, info]) => {
    const override = employeeStatusOverrides[name.toLowerCase()];
    const status = override?.status ?? info.status ?? 'idle';
    const task = override?.task ?? info.current_task ?? '';

    const card = document.createElement('div');
    card.className = 'emp-card';

    const dot = document.createElement('div');
    dot.className = 'emp-dot';
    dot.style.background = status === 'active' || status === 'working' ? 'var(--green)'
      : status === 'busy' ? 'var(--orange)'
      : status === 'offline' ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.4)';

    const empInfo = document.createElement('div');
    empInfo.className = 'emp-info';

    const nameEl = document.createElement('span');
    nameEl.className = 'emp-name';
    nameEl.textContent = name.charAt(0).toUpperCase() + name.slice(1);

    const taskEl = document.createElement('span');
    taskEl.className = 'emp-task';
    taskEl.textContent = task || status;

    empInfo.appendChild(nameEl);
    empInfo.appendChild(taskEl);
    card.appendChild(dot);
    card.appendChild(empInfo);
    grid.appendChild(card);
  });
}

function renderSystemError() {
  document.getElementById('sys-bars').innerHTML = '<span class="empty">Unable to load status</span>';
  document.getElementById('sys-badge').textContent = '—';
}

// ── Data refresh intervals ──────────────────────────────────────────────────

function startPolling() {
  // Initial loads
  fetchServices();
  fetchTrading();
  fetchEmails();
  fetchCalendar();
  fetchFollowups();
  fetchSystem();

  // Refresh intervals
  setInterval(fetchServices, 30_000);        // 30s
  setInterval(fetchTrading, 5 * 60_000);     // 5m
  setInterval(fetchEmails, 60_000);          // 60s
  setInterval(fetchCalendar, 2 * 60_000);    // 2m
  setInterval(fetchFollowups, 2 * 60_000);   // 2m
  setInterval(fetchSystem, 30_000);          // 30s
}

// ── Boot ───────────────────────────────────────────────────────────────────

connectWS();
startPolling();
</script>
