<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control — Bob • Symphony Smart Homes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 24px 16px 16px;
    border-bottom: 1px solid #1e1e2e;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #448aff;
    text-transform: uppercase;
  }
  .header .subtitle {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
  }
  .summary-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 16px;
    border-bottom: 1px solid #1e1e2e;
  }
  .summary-stat {
    text-align: center;
  }
  .summary-stat .value {
    font-size: 28px;
    font-weight: 700;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .summary-stat .label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .healthy-val { color: #00e676; }
  .degraded-val { color: #ffc107; }
  .down-val { color: #ff5252; }
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
  .card {
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 8px;
    padding: 16px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #448aff;
    margin-bottom: 12px;
  }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }
  .service-card {
    background: #0a0a0f;
    border: 1px solid #1e1e2e;
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.2s;
  }
  .service-card:hover { border-color: #448aff; }
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-healthy { background: #00e676; box-shadow: 0 0 6px #00e67644; }
  .status-degraded { background: #ffc107; box-shadow: 0 0 6px #ffc10744; }
  .status-down { background: #ff5252; box-shadow: 0 0 6px #ff525244; }
  .service-info { flex: 1; min-width: 0; }
  .service-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .service-port {
    font-size: 11px;
    color: #666;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .service-time {
    font-size: 10px;
    color: #555;
  }
  /* Event feed */
  .event-feed {
    grid-column: 1 / -1;
  }
  .feed-list {
    max-height: 400px;
    overflow-y: auto;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .feed-list::-webkit-scrollbar { width: 6px; }
  .feed-list::-webkit-scrollbar-track { background: transparent; }
  .feed-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .feed-entry {
    padding: 4px 8px;
    border-bottom: 1px solid #1a1a24;
    display: flex;
    gap: 8px;
  }
  .feed-entry:hover { background: #1a1a24; }
  .feed-ts { color: #555; white-space: nowrap; }
  .feed-emp { font-weight: 600; min-width: 70px; }
  .feed-emp.bob { color: #448aff; }
  .feed-emp.betty { color: #e040fb; }
  .feed-emp.beatrice { color: #00e676; }
  .feed-emp.bill { color: #ffc107; }
  .feed-msg { color: #bbb; }
  .feed-empty { color: #555; padding: 20px; text-align: center; }
  /* Quick stats */
  .quick-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat-item {
    background: #0a0a0f;
    border: 1px solid #1e1e2e;
    border-radius: 6px;
    padding: 12px;
    text-align: center;
  }
  .stat-item .stat-value {
    font-size: 22px;
    font-weight: 700;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: #448aff;
  }
  .stat-item .stat-label {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }
  .refresh-info {
    text-align: center;
    padding: 8px;
    font-size: 11px;
    color: #444;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Mission Control</h1>
  <div class="subtitle">Bob &bull; Symphony Smart Homes</div>
</div>

<div class="summary-bar">
  <div class="summary-stat">
    <div class="value healthy-val" id="count-healthy">-</div>
    <div class="label">Healthy</div>
  </div>
  <div class="summary-stat">
    <div class="value degraded-val" id="count-degraded">-</div>
    <div class="label">Degraded</div>
  </div>
  <div class="summary-stat">
    <div class="value down-val" id="count-down">-</div>
    <div class="label">Down</div>
  </div>
</div>

<div class="main-grid">
  <div class="card" style="grid-column: 1 / -1;">
    <div class="card-title">Service Health</div>
    <div class="services-grid" id="services-grid"></div>
  </div>

  <div class="card">
    <div class="card-title">Quick Stats</div>
    <div class="quick-stats" id="quick-stats">
      <div class="stat-item"><div class="stat-value" id="stat-services">-</div><div class="stat-label">Total Services</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-uptime">-</div><div class="stat-label">Uptime %</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-events">-</div><div class="stat-label">Events Today</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-connections">-</div><div class="stat-label">WS Connections</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Employee Status</div>
    <div id="employee-status"></div>
  </div>

  <div class="card event-feed">
    <div class="card-title">Live Event Feed</div>
    <div class="feed-list" id="feed-list">
      <div class="feed-empty">Connecting to event stream...</div>
    </div>
  </div>
</div>

<div class="refresh-info">Auto-refresh every 30s &bull; <span id="last-refresh">-</span></div>

<script>
(function() {
  const MAX_FEED = 200;
  const POLL_INTERVAL = 30000;
  let feedEntries = [];
  let ws = null;

  // ── Service Health Polling ──
  async function pollServices() {
    try {
      const resp = await fetch('/api/services');
      const data = await resp.json();
      renderServices(data.services);
      updateSummary(data.services);
      document.getElementById('stat-services').textContent = data.total;
      const pct = data.total > 0 ? Math.round((data.healthy / data.total) * 100) : 0;
      document.getElementById('stat-uptime').textContent = pct + '%';
    } catch (e) {
      console.error('Health poll failed:', e);
    }
    document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString();
  }

  function renderServices(services) {
    const grid = document.getElementById('services-grid');
    grid.innerHTML = '';
    services.forEach(s => {
      const card = document.createElement('div');
      card.className = 'service-card';
      const time = s.checked_at ? new Date(s.checked_at).toLocaleTimeString() : '';
      card.innerHTML = `
        <div class="status-dot status-${s.status}"></div>
        <div class="service-info">
          <div class="service-name">${s.name}</div>
          <div class="service-port">:${s.port}</div>
        </div>
        <div class="service-time">${time}</div>
      `;
      grid.appendChild(card);
    });
  }

  function updateSummary(services) {
    let h = 0, d = 0, dn = 0;
    services.forEach(s => {
      if (s.status === 'healthy') h++;
      else if (s.status === 'degraded') d++;
      else dn++;
    });
    document.getElementById('count-healthy').textContent = h;
    document.getElementById('count-degraded').textContent = d;
    document.getElementById('count-down').textContent = dn;
  }

  // ── Event Status Polling ──
  async function pollStatus() {
    try {
      const resp = await fetch('/status');
      const data = await resp.json();
      document.getElementById('stat-connections').textContent = data.connections || 0;
      renderEmployees(data.employees);
    } catch (e) {}
    try {
      const resp = await fetch('/events?limit=1');
      const data = await resp.json();
      document.getElementById('stat-events').textContent = data.count || 0;
    } catch (e) {}
  }

  function renderEmployees(employees) {
    const el = document.getElementById('employee-status');
    if (!employees) { el.innerHTML = '<div class="feed-empty">No data</div>'; return; }
    let html = '';
    for (const [name, info] of Object.entries(employees)) {
      const color = { working: '#ffc107', active: '#00e676', idle: '#555' }[info.status] || '#555';
      const task = info.current_task ? ` — ${info.current_task}` : '';
      html += `<div style="padding:6px 0;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1a1a24">
        <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
        <span style="font-weight:600;min-width:70px;text-transform:capitalize">${name}</span>
        <span style="color:#888;font-size:12px">${info.status}${task}</span>
      </div>`;
    }
    el.innerHTML = html;
  }

  // ── WebSocket Event Feed ──
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => console.log('WS connected');
    ws.onclose = () => { console.log('WS closed, reconnecting...'); setTimeout(connectWS, 3000); };
    ws.onerror = () => ws.close();
    ws.onmessage = (evt) => {
      try {
        const event = JSON.parse(evt.data);
        if (event.type === 'status_update') {
          renderEmployees(event.employees);
          return;
        }
        addFeedEntry(event);
      } catch (e) {}
    };
  }

  function addFeedEntry(event) {
    feedEntries.unshift(event);
    if (feedEntries.length > MAX_FEED) feedEntries = feedEntries.slice(0, MAX_FEED);
    renderFeed();
  }

  function renderFeed() {
    const list = document.getElementById('feed-list');
    if (feedEntries.length === 0) {
      list.innerHTML = '<div class="feed-empty">No events yet</div>';
      return;
    }
    let html = '';
    for (const e of feedEntries.slice(0, 100)) {
      const ts = e.timestamp ? new Date(e.timestamp).toLocaleTimeString() : '';
      const emp = (e.employee || 'system').toLowerCase();
      const title = e.title || e.event_type || 'event';
      html += `<div class="feed-entry">
        <span class="feed-ts">${ts}</span>
        <span class="feed-emp ${emp}">${emp}</span>
        <span class="feed-msg">${escapeHtml(title)}</span>
      </div>`;
    }
    list.innerHTML = html;
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ── Init ──
  pollServices();
  pollStatus();
  connectWS();
  setInterval(pollServices, POLL_INTERVAL);
  setInterval(pollStatus, POLL_INTERVAL);
})();
</script>
</body>
</html>
