<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control — Trading</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000;
  --card: #1c1c1e;
  --border: #2c2c2e;
  --text: #fff;
  --text2: rgba(255,255,255,0.65);
  --text3: rgba(255,255,255,0.38);
  --teal: #2dd4bf;
  --red: #ef4444;
  --font: -apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif;
  --mono: 'SF Mono', 'Fira Code', monospace;
  --radius: 12px;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Nav ── */
#nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: #111;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  z-index: 100;
}
.nav-brand {
  font-size: 13px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.nav-sep { color: var(--border); }
.nav-link {
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  color: var(--text2);
  padding: 4px 10px;
  border-radius: 6px;
}
.nav-link.active {
  color: var(--text);
  background: rgba(255,255,255,0.08);
}
.nav-link:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.nav-spacer { flex: 1; }
#last-update {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--mono);
}

/* ── Layout ── */
#layout {
  display: flex;
  gap: 14px;
  padding: 62px 14px 40px;
  min-height: 100vh;
  align-items: flex-start;
}

/* ── Columns ── */
#col-left {
  width: 250px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: sticky;
  top: 62px;
}
#col-center {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
#col-right {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: sticky;
  top: 62px;
  max-height: calc(100vh - 62px);
}

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  font-weight: 600;
  margin-bottom: 14px;
}

/* ── Portfolio stats ── */
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.stat-row:last-child { border-bottom: none; }
.stat-label { font-size: 13px; color: var(--text2); }
.stat-val {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.stat-val.pos { color: var(--teal); }
.stat-val.neg { color: var(--red); }

.total-val {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--teal);
  line-height: 1.1;
  margin-top: 4px;
}
.total-val.neg { color: var(--red); }
.total-sub {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
}

/* ── Positions table ── */
.tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  text-align: left;
  padding: 8px 6px;
  color: var(--text3);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}
thead th:hover { color: var(--text2); }
thead th.sort-asc::after { content: ' ↑'; color: var(--teal); }
thead th.sort-desc::after { content: ' ↓'; color: var(--teal); }
thead th.right { text-align: right; }
tbody td {
  padding: 9px 6px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(255,255,255,0.02); }
.td-title {
  max-width: 200px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.td-cat {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  background: rgba(255,255,255,0.08);
  color: var(--text2);
  white-space: nowrap;
}
.td-num {
  font-family: var(--mono);
  font-size: 13px;
  white-space: nowrap;
  text-align: right;
}
.td-num.pos { color: var(--teal); }
.td-num.neg { color: var(--red); }
.empty-row td { text-align: center; color: var(--text3); padding: 20px 0; }

/* ── Chart ── */
.chart-wrap {
  position: relative;
  height: 200px;
}

/* ── Activity feed ── */
#activity-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
  max-height: calc(100vh - 180px);
  scrollbar-width: thin;
  scrollbar-color: #333 transparent;
  padding-right: 2px;
}
#activity-list::-webkit-scrollbar { width: 4px; }
#activity-list::-webkit-scrollbar-track { background: transparent; }
#activity-list::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

.act-item {
  padding: 9px 11px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  font-size: 12px;
  flex-shrink: 0;
}
.act-ts {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 4px;
}
.act-badge {
  display: inline-block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 1px 6px;
  border-radius: 99px;
  margin-right: 5px;
  font-weight: 600;
}
.act-badge.buy  { background: rgba(45,212,191,0.15); color: var(--teal); }
.act-badge.sell { background: rgba(239,68,68,0.15);  color: var(--red); }
.act-badge.redeem { background: rgba(255,214,10,0.12); color: #ffd60a; }
.act-badge.info { background: rgba(255,255,255,0.07); color: var(--text3); }
.act-msg { color: var(--text2); line-height: 1.45; word-break: break-word; }
.act-empty { color: var(--text3); font-size: 13px; text-align: center; padding: 16px 0; }

/* ── Responsive ── */
@media (max-width: 1100px) { #col-right { display: none; } }
@media (max-width: 780px) {
  #layout { flex-direction: column; }
  #col-left { width: 100%; position: static; }
  #col-center { width: 100%; }
}
</style>
</head>
<body>

<nav id="nav">
  <span class="nav-brand">Symphony MC</span>
  <span class="nav-sep">|</span>
  <a class="nav-link active" href="/">Trading</a>
  <a class="nav-link" href="/ops">Ops</a>
  <span class="nav-spacer"></span>
  <span id="last-update">—</span>
</nav>

<div id="layout">

  <!-- ── Left: Portfolio Summary ── -->
  <div id="col-left">
    <div class="card">
      <div class="card-title">Portfolio</div>
      <div class="stat-row">
        <span class="stat-label">USDC Balance</span>
        <span class="stat-val" id="stat-usdc">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Position Value</span>
        <span class="stat-val" id="stat-pos">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Daily P&amp;L</span>
        <span class="stat-val" id="stat-daily">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">7-Day P&amp;L</span>
        <span class="stat-val" id="stat-weekly">—</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Total Value</div>
      <div class="total-val" id="stat-total">—</div>
      <div class="total-sub" id="stat-total-sub">&nbsp;</div>
    </div>
  </div>

  <!-- ── Center: Positions + Chart ── -->
  <div id="col-center">
    <div class="card">
      <div class="card-title">Open Positions</div>
      <div class="tbl-wrap">
        <table id="pos-table">
          <thead>
            <tr>
              <th data-col="title">Title</th>
              <th data-col="category">Category</th>
              <th data-col="entry_price" class="right">Entry</th>
              <th data-col="current_price" class="right">Current</th>
              <th data-col="pnl_pct" class="right">P&amp;L%</th>
              <th data-col="value_usd" class="right">Value</th>
              <th data-col="hold_hours" class="right">Hrs</th>
            </tr>
          </thead>
          <tbody id="pos-body">
            <tr class="empty-row"><td colspan="7">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Cumulative P&amp;L</div>
      <div class="chart-wrap">
        <canvas id="pnl-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- ── Right: Activity Feed ── -->
  <div id="col-right">
    <div class="card" style="flex:1; display:flex; flex-direction:column; min-height:0;">
      <div class="card-title">Live Activity</div>
      <div id="activity-list">
        <div class="act-empty">Loading…</div>
      </div>
    </div>
  </div>

</div>

<script>
'use strict';

/* ── utils ── */
function fmt$(n) {
  if (n == null || n === '' || isNaN(+n)) return '—';
  return '$' + (+n).toFixed(2);
}
function fmtPct(n) {
  if (n == null || n === '' || isNaN(+n)) return '—';
  const v = +n;
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}
function posNeg(n) {
  if (n == null || isNaN(+n)) return '';
  return +n >= 0 ? 'pos' : 'neg';
}
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function shortTs(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  } catch(e) { return String(ts).slice(0,19); }
}

/* ── state ── */
let _positions = [];
let _sortCol   = 'value_usd';
let _sortDir   = -1;
let _chart     = null;
let _seen      = new Set();

/* ── wallet ── */
async function loadWallet() {
  try {
    const d = await fetch('/api/wallet').then(r => r.json());
    const usdc   = +d.usdc_balance   || 0;
    const posVal = +d.position_value || 0;
    const daily  = d.daily_pnl  != null ? +d.daily_pnl  : null;
    const weekly = d.weekly_pnl != null ? +d.weekly_pnl : null;
    const total  = usdc + posVal;

    setText('stat-usdc',   fmt$(usdc),   '');
    setText('stat-pos',    fmt$(posVal), '');
    setValEl('stat-daily',  daily,  fmt$(daily));
    setValEl('stat-weekly', weekly, fmt$(weekly));

    const el = document.getElementById('stat-total');
    el.textContent = fmt$(total);
    el.className = 'total-val' + (total < 0 ? ' neg' : '');
    document.getElementById('stat-total-sub').textContent =
      'USDC ' + fmt$(usdc) + ' + positions ' + fmt$(posVal);
  } catch(e) { console.warn('wallet err', e); }
}
function setText(id, val, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
  el.className = 'stat-val' + (cls ? ' ' + cls : '');
}
function setValEl(id, num, display) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = display;
  el.className = 'stat-val ' + posNeg(num);
}

/* ── positions ── */
async function loadPositions() {
  try {
    const data = await fetch('/api/positions').then(r => r.json());
    _positions = Array.isArray(data) ? data : [];
    renderPositions();
  } catch(e) { console.warn('positions err', e); }
}
function renderPositions() {
  const tbody = document.getElementById('pos-body');
  if (!tbody) return;
  if (!_positions.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No open positions</td></tr>';
    return;
  }
  const sorted = [..._positions].sort((a, b) => {
    let av = a[_sortCol], bv = b[_sortCol];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av == null) av = _sortDir > 0 ? Infinity : -Infinity;
    if (bv == null) bv = _sortDir > 0 ? Infinity : -Infinity;
    return av < bv ? _sortDir : av > bv ? -_sortDir : 0;
  });
  tbody.innerHTML = sorted.map(p => {
    const pnl = p.pnl_pct != null ? +p.pnl_pct : null;
    return `<tr>
      <td><span class="td-title" title="${esc(p.title||'')}">${esc(p.title||'—')}</span></td>
      <td><span class="td-cat">${esc(p.category||'—')}</span></td>
      <td class="td-num right">${fmt$(p.entry_price)}</td>
      <td class="td-num right">${fmt$(p.current_price)}</td>
      <td class="td-num ${posNeg(pnl)} right">${fmtPct(pnl)}</td>
      <td class="td-num right">${fmt$(p.value_usd)}</td>
      <td class="td-num right">${p.hold_hours != null ? (+p.hold_hours).toFixed(1)+'h' : '—'}</td>
    </tr>`;
  }).join('');
}

/* sortable headers */
document.querySelectorAll('#pos-table thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (_sortCol === col) { _sortDir *= -1; }
    else { _sortCol = col; _sortDir = -1; }
    document.querySelectorAll('#pos-table thead th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
    th.classList.add(_sortDir < 0 ? 'sort-desc' : 'sort-asc');
    renderPositions();
  });
});

/* ── P&L chart ── */
async function loadChart() {
  try {
    const data = await fetch('/api/pnl-series').then(r => r.json());
    if (!Array.isArray(data) || !data.length) return;
    const labels = data.map(d => {
      try { return new Date(d.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
      catch(e) { return d.timestamp; }
    });
    const values = data.map(d => +d.pnl || 0);
    const ctx = document.getElementById('pnl-chart');
    if (!ctx) return;
    if (_chart) _chart.destroy();
    _chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: '#2dd4bf',
          backgroundColor: 'rgba(45,212,191,0.06)',
          borderWidth: 2,
          pointRadius: 2,
          pointHoverRadius: 4,
          tension: 0.35,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: ctx => '$' + ctx.parsed.y.toFixed(2) }
          }
        },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(255,255,255,0.38)', font: { size: 11 } } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(255,255,255,0.38)', font: { size: 11 }, callback: v => '$' + v.toFixed(0) } }
        }
      }
    });
  } catch(e) { console.warn('chart err', e); }
}

/* ── activity ── */
async function loadActivity() {
  try {
    const data = await fetch('/api/activity').then(r => r.json());
    if (!Array.isArray(data)) return;
    const list = document.getElementById('activity-list');
    if (!list) return;
    const newItems = data.filter(item => {
      const k = (item.timestamp||'')+'|'+(item.message||'');
      if (_seen.has(k)) return false;
      _seen.add(k); return true;
    });
    if (newItems.length) {
      const emptyEl = list.querySelector('.act-empty');
      if (emptyEl) emptyEl.remove();
      newItems.forEach(item => {
        const type = (item.type||'info').toLowerCase();
        const badge = ['buy','sell','redeem'].includes(type) ? type : 'info';
        const div = document.createElement('div');
        div.className = 'act-item';
        div.innerHTML =
          `<div class="act-ts">${esc(shortTs(item.timestamp))}</div>` +
          `<span class="act-badge ${badge}">${esc(item.type||'info')}</span>` +
          `<span class="act-msg">${esc(item.message||'')}</span>`;
        list.insertBefore(div, list.firstChild);
      });
      /* cap at 50 */
      while (list.children.length > 50) list.removeChild(list.lastChild);
    }
    if (!list.children.length) {
      list.innerHTML = '<div class="act-empty">No recent activity</div>';
    }
  } catch(e) { console.warn('activity err', e); }
}

/* ── refresh all ── */
async function refreshAll() {
  await Promise.all([loadWallet(), loadPositions(), loadChart()]);
  document.getElementById('last-update').textContent =
    'updated ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}

/* ── init ── */
refreshAll();
loadActivity();
setInterval(refreshAll, 30000);
setInterval(loadActivity, 15000);
</script>
</body>
</html>
