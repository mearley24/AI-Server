services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - kuma:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - openwebui:/app/backend/data
      - "./data:/data"
    environment:
      - WEBUI_NAME=AI-Server
      - ENABLE_API_KEYS=True
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  telegram-interface:
    build:
      context: ./telegram-interface
    container_name: telegram-interface
    restart: unless-stopped
    env_file:
      - ./telegram-interface/.env
    depends_on:
      - openwebui
    volumes:
      - "./data:/data"
      - "/Users/bob/Library/Mobile Documents/com~apple~CloudDocs/Symphony SH/Bob_Library:/library"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  remediator:
    build:
      context: ./remediator
    container_name: remediator
    restart: unless-stopped
    env_file:
      - ./remediator/.env
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - telegram-interface
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  polymarket-bot:
    build:
      context: ./polymarket-bot
    container_name: polymarket-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - PLATFORMS_ENABLED=${PLATFORMS_ENABLED:-kalshi,crypto}
      - KALSHI_API_KEY_ID=${KALSHI_API_KEY_ID:-}
      - KALSHI_PRIVATE_KEY_PATH=/app/secrets/kalshi.key
      - KALSHI_ENVIRONMENT=${KALSHI_ENVIRONMENT:-demo}
      - KALSHI_DRY_RUN=${KALSHI_DRY_RUN:-true}
      - KRAKEN_API_KEY=${KRAKEN_API_KEY:-}
      - KRAKEN_API_SECRET=${KRAKEN_API_SECRET:-}
      - KRAKEN_DRY_RUN=${KRAKEN_DRY_RUN:-true}
      - CRYPTO_EXCHANGE=${CRYPTO_EXCHANGE:-kraken}
    ports:
      - "127.0.0.1:8430:8430"
    volumes:
      - ./data/polymarket:/data
      - ./polymarket-bot/secrets:/app/secrets:ro
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8430/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  btc-15m-assistant:
    build:
      context: ./polymarket-bot/sidecar
    container_name: btc-15m-assistant
    restart: unless-stopped
    environment:
      - POLYMARKET_AUTO_SELECT_LATEST=true
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - polymarket-bot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  proposals:
    build:
      context: ./proposals
    container_name: proposals
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8091:8091"
    volumes:
      - ./data/proposals:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  email-monitor:
    build:
      context: ./email-monitor
    container_name: email-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "127.0.0.1:8092:8092"
    volumes:
      - ./data/email-monitor:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  voice-receptionist:
    build:
      context: ./voice_receptionist
    container_name: voice-receptionist
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - SYMPHONY_PHONE=${SYMPHONY_PHONE}
      - DB_PATH=/app/data/bob.db
    ports:
      - "127.0.0.1:8093:3000"
    volumes:
      - ./data/voice-receptionist:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  kuma:
  openwebui:
  redis_data:
