# =============================================================================
# AI-Server Docker Compose
# Active services: 15 | Disabled: 3 (telegram-interface, btc-15m-assistant, uptime-kuma)
# Resource note: disabling 3 services saves ~1.5 GB RAM and reduces build time
# =============================================================================

services:

  # DISABLED — replaced by mission-control health monitoring
  # uptime-kuma:
  #   image: louislam/uptime-kuma:1
  #   container_name: uptime-kuma
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:3001:3001"
  #   volumes:
  #     - kuma:/app/data
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "5"

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - openwebui:/app/backend/data
      - "./data:/data"
    environment:
      - WEBUI_NAME=AI-Server
      - ENABLE_API_KEYS=True
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # DISABLED — replaced by notification-hub (iMessage via Linq)
  # telegram-interface:
  #   build:
  #     context: ./telegram-interface
  #   container_name: telegram-interface
  #   restart: unless-stopped
  #   env_file:
  #     - ./telegram-interface/.env
  #   depends_on:
  #     - openwebui
  #   volumes:
  #     - "./data:/data"
  #     - "/Users/bob/Library/Mobile Documents/com~apple~CloudDocs/Symphony SH/Bob_Library:/library"
  #   healthcheck:
  #     test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 20s
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "5"

  remediator:
    build:
      context: ./remediator
    container_name: remediator
    restart: unless-stopped
    env_file:
      - ./remediator/.env
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - redis
    # TODO: rewire alert delivery from Telegram to Redis pub/sub notifications channel
    # so notification-hub can dispatch alerts via iMessage
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  vpn:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: vpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - ./polymarket-bot/vpn:/config/wg_confs
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "127.0.0.1:8430:8430"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 1.1.1.1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  polymarket-bot:
    build:
      context: ./polymarket-bot
    container_name: polymarket-bot
    restart: unless-stopped
    network_mode: "service:vpn"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - PLATFORMS_ENABLED=${PLATFORMS_ENABLED:-kalshi,crypto}
      - KALSHI_API_KEY_ID=${KALSHI_API_KEY_ID:-}
      - KALSHI_PRIVATE_KEY_PATH=/app/secrets/kalshi.key
      - KALSHI_ENVIRONMENT=${KALSHI_ENVIRONMENT:-demo}
      - KALSHI_DRY_RUN=${KALSHI_DRY_RUN:-true}
      - KRAKEN_API_KEY=${KRAKEN_API_KEY:-}
      - KRAKEN_API_SECRET=${KRAKEN_API_SECRET:-}
      - KRAKEN_DRY_RUN=${KRAKEN_DRY_RUN:-true}
      - CRYPTO_EXCHANGE=${CRYPTO_EXCHANGE:-kraken}
      - FINANCIAL_DATASETS_API_KEY=${FINANCIAL_DATASETS_API_KEY:-}
    volumes:
      - ./data/polymarket:/data
      - ./polymarket-bot/secrets:/app/secrets:ro
    depends_on:
      vpn:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8430/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # DISABLED — Avellaneda strategy uses direct orderbook data
  # btc-15m-assistant:
  #   build:
  #     context: ./polymarket-bot/sidecar
  #   container_name: btc-15m-assistant
  #   restart: unless-stopped
  #   environment:
  #     - POLYMARKET_AUTO_SELECT_LATEST=true
  #     - REDIS_URL=redis://redis:6379
  #   depends_on:
  #     - redis
  #     - polymarket-bot
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "5"

  proposals:
    build:
      context: ./proposals
    container_name: proposals
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8091:8091"
    volumes:
      - ./data/proposals:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  email-monitor:
    build:
      context: ./email-monitor
    container_name: email-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "127.0.0.1:8092:8092"
    volumes:
      - ./data/email-monitor:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  voice-receptionist:
    build:
      context: ./voice_receptionist
    container_name: voice-receptionist
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - SYMPHONY_PHONE=${SYMPHONY_PHONE}
      - DB_PATH=/app/data/bob.db
    ports:
      - "127.0.0.1:8093:3000"
    volumes:
      - ./data/voice-receptionist:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  calendar-agent:
    build:
      context: ./calendar-agent
    container_name: calendar-agent
    restart: unless-stopped
    environment:
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET}
      - ZOHO_REFRESH_TOKEN=${ZOHO_REFRESH_TOKEN}
      - ZOHO_CALENDAR_UID=${ZOHO_CALENDAR_UID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379
      - TZ=America/Denver
    ports:
      - "127.0.0.1:8094:8094"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8094/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  notification-hub:
    build:
      context: ./notification-hub
    container_name: notification-hub
    restart: unless-stopped
    environment:
      - NOTIFICATION_CHANNEL=${NOTIFICATION_CHANNEL:-console}
      - IMESSAGE_BRIDGE_URL=http://host.docker.internal:8199
      - OWNER_PHONE_NUMBER=${OWNER_PHONE_NUMBER:-}
      - REDIS_URL=redis://redis:6379
    ports:
      - "127.0.0.1:8095:8095"
    volumes:
      - ./data/notification-hub:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  dtools-bridge:
    build:
      context: ./integrations/dtools
    container_name: dtools-bridge
    restart: unless-stopped
    environment:
      - DTOOLS_API_KEY=${DTOOLS_API_KEY}
      - DTOOLS_BASE_URL=${DTOOLS_BASE_URL:-https://api.d-tools.com/v2}
      - DTOOLS_BRIDGE_PORT=5050
      - LOG_LEVEL=INFO
    ports:
      - "127.0.0.1:8096:5050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5050/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  clawwork:
    build:
      context: ./clawwork
      dockerfile: Dockerfile.clawwork
    container_name: clawwork
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
      - TZ=America/Denver
    ports:
      - "127.0.0.1:8097:8097"
    volumes:
      - ./data/clawwork:/root/.symphony
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8097/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  openclaw:
    build:
      context: ./openclaw
    container_name: openclaw
    restart: unless-stopped
    environment:
      - PORT=3000
      - LOG_LEVEL=info
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      - CONDUCTOR_MODEL=${CONDUCTOR_MODEL:-claude-sonnet-4-5}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      - AGENTS_DIR=/app/agents
      - DATA_DIR=/app/data
    ports:
      - "127.0.0.1:8099:3000"
    volumes:
      - ./agents:/app/agents:ro
      - ./data/openclaw:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  knowledge-scanner:
    build:
      context: ./knowledge-scanner
    container_name: knowledge-scanner
    restart: unless-stopped
    environment:
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      - REDIS_URL=redis://redis:6379
      - TZ=America/Denver
      - SCAN_INTERVAL_HOURS=6
    ports:
      - "127.0.0.1:8100:8100"
    volumes:
      - ./data/knowledge-scanner:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  mission-control:
    build:
      context: ./mission_control
    container_name: mission-control
    restart: unless-stopped
    environment:
      - PORT=8098
      - REDIS_URL=redis://redis:6379
      - TZ=America/Denver
    ports:
      - "127.0.0.1:8098:8098"
    volumes:
      - ./data/mission-control:/data
      - ./data/polymarket:/trading-data:ro
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8098/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  # kuma volume removed — uptime-kuma disabled
  openwebui:
  redis_data:
