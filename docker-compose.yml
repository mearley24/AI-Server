# =============================================================================
# AI-Server Docker Compose
# Active services: 15
# =============================================================================

services:

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - openwebui:/app/backend/data
      - "./data:/data"
    environment:
      - WEBUI_NAME=AI-Server
      - ENABLE_API_KEYS=True
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  remediator:
    build:
      context: ./remediator
    container_name: remediator
    restart: unless-stopped
    env_file:
      - ./remediator/.env
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  vpn:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: vpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - ./polymarket-bot/vpn:/config/wg_confs
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8430:8430"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 1.1.1.1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  polymarket-bot:
    build:
      context: ./polymarket-bot
    container_name: polymarket-bot
    restart: unless-stopped
    network_mode: "service:vpn"
    # ports via vpn service (network_mode shares vpn's network stack)
    # redis via host.docker.internal since Docker DNS unavailable in vpn network
    environment:
      - TZ=America/Denver
      - REDIS_URL=redis://host.docker.internal:6379
      - PLATFORMS_ENABLED=${PLATFORMS_ENABLED:-polymarket,kalshi,crypto}
      - POLY_PRIVATE_KEY=${POLY_PRIVATE_KEY:-}
      - POLY_PROXY_ADDRESS=${POLY_PROXY_ADDRESS:-}
      - POLY_BUILDER_API_KEY=${POLY_BUILDER_API_KEY:-}
      - POLY_BUILDER_API_SECRET=${POLY_BUILDER_API_SECRET:-}
      - POLY_BUILDER_API_PASSPHRASE=${POLY_BUILDER_API_PASSPHRASE:-}
      - POLY_DRY_RUN=${POLY_DRY_RUN:-false}
      - POLY_SAFE_ADDRESS=${POLY_SAFE_ADDRESS:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - KALSHI_API_KEY_ID=${KALSHI_API_KEY_ID:-}
      - KALSHI_PRIVATE_KEY_PATH=/app/secrets/kalshi.key
      - KALSHI_ENVIRONMENT=${KALSHI_ENVIRONMENT:-demo}
      - KALSHI_DRY_RUN=${KALSHI_DRY_RUN:-true}
      - KRAKEN_API_KEY=${KRAKEN_API_KEY:-}
      - KRAKEN_API_SECRET=${KRAKEN_API_SECRET:-}
      - KRAKEN_DRY_RUN=${KRAKEN_DRY_RUN:-false}
      - CRYPTO_EXCHANGE=${CRYPTO_EXCHANGE:-kraken}
      - FINANCIAL_DATASETS_API_KEY=${FINANCIAL_DATASETS_API_KEY:-}
      # Notification pipeline — must be "imessage" to send via iMessage
      - NOTIFICATION_CHANNEL=${NOTIFICATION_CHANNEL:-imessage}
      - NOTIFICATION_HUB_URL=http://host.docker.internal:8095
      # Phase 1: Kelly Criterion position sizing
      - KELLY_SIZING_ENABLED=${KELLY_SIZING_ENABLED:-true}
      - KELLY_FRACTION=${KELLY_FRACTION:-0.25}
      - COPYTRADE_BANKROLL=${COPYTRADE_BANKROLL:-300}
      # Phase 1: Smart exit parameters
      - EXIT_TP1_PCT=${EXIT_TP1_PCT:-0.15}
      - EXIT_TP2_PCT=${EXIT_TP2_PCT:-0.30}
      - EXIT_SL_PCT=${EXIT_SL_PCT:-0.25}
      - EXIT_TRAILING_PCT=${EXIT_TRAILING_PCT:-0.10}
      - EXIT_TIME_HOURS=${EXIT_TIME_HOURS:-48}
      # Phase 2: Correlation exposure limits
      - CORRELATION_MAX_PCT=${CORRELATION_MAX_PCT:-0.15}
      # Phase 3: LLM trade validation
      - LLM_VALIDATION_ENABLED=${LLM_VALIDATION_ENABLED:-true}
      # Phase 3: Liquidity provision
      - LP_ENABLED=${LP_ENABLED:-false}
      - LP_MAX_MARKETS=${LP_MAX_MARKETS:-5}
      - LP_SPREAD_CENTS=${LP_SPREAD_CENTS:-2}
      - LP_ORDER_SIZE=${LP_ORDER_SIZE:-10}
      # Expanded scan configuration
      - COPYTRADE_SCAN_MARKETS=${COPYTRADE_SCAN_MARKETS:-500}
      - COPYTRADE_SCAN_CATEGORIES=${COPYTRADE_SCAN_CATEGORIES:-politics,sports,crypto,science}
      - COPYTRADE_LEADERBOARD_ENABLED=${COPYTRADE_LEADERBOARD_ENABLED:-true}
    volumes:
      - ./data/polymarket:/data
      - ./polymarket-bot/secrets:/app/secrets:ro
    depends_on:
      vpn:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8430/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  proposals:
    build:
      context: ./proposals
    container_name: proposals
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8091:8091"
    volumes:
      - ./data/proposals:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  email-monitor:
    build:
      context: ./email-monitor
    container_name: email-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "127.0.0.1:8092:8092"
    volumes:
      - ./data/email-monitor:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  voice-receptionist:
    build:
      context: ./voice_receptionist
    container_name: voice-receptionist
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - SYMPHONY_PHONE=${SYMPHONY_PHONE}
      - DB_PATH=/app/data/bob.db
    ports:
      - "127.0.0.1:8093:3000"
    volumes:
      - ./data/voice-receptionist:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  calendar-agent:
    build:
      context: ./calendar-agent
    container_name: calendar-agent
    restart: unless-stopped
    environment:
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET}
      - ZOHO_REFRESH_TOKEN=${ZOHO_REFRESH_TOKEN}
      - ZOHO_CALENDAR_UID=${ZOHO_CALENDAR_UID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379
      - TZ=America/Denver
    ports:
      - "127.0.0.1:8094:8094"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8094/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  notification-hub:
    build:
      context: ./notification-hub
    container_name: notification-hub
    restart: unless-stopped
    environment:
      - NOTIFICATION_CHANNEL=${NOTIFICATION_CHANNEL:-imessage}
      - IMESSAGE_BRIDGE_URL=http://host.docker.internal:8199
      - OWNER_PHONE_NUMBER=${OWNER_PHONE_NUMBER:-}
      - REDIS_URL=redis://redis:6379
    ports:
      - "127.0.0.1:8095:8095"
    volumes:
      - ./data/notification-hub:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  dtools-bridge:
    build:
      context: ./integrations/dtools
    container_name: dtools-bridge
    restart: unless-stopped
    environment:
      - DTOOLS_API_KEY=${DTOOLS_API_KEY}
      - DTOOLS_BASE_URL=${DTOOLS_BASE_URL:-https://api.d-tools.com/v2}
      - DTOOLS_BRIDGE_PORT=5050
      - LOG_LEVEL=INFO
    ports:
      - "127.0.0.1:8096:5050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5050/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  clawwork:
    build:
      context: ./clawwork
      dockerfile: Dockerfile.clawwork
    container_name: clawwork
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
      - TZ=America/Denver
    ports:
      - "127.0.0.1:8097:8097"
    volumes:
      - ./data/clawwork:/root/.symphony
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8097/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  openclaw:
    build:
      context: ./openclaw
    container_name: openclaw
    restart: unless-stopped
    environment:
      - PORT=3000
      - LOG_LEVEL=info
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      - CONDUCTOR_MODEL=${CONDUCTOR_MODEL:-claude-sonnet-4-5}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      - AGENTS_DIR=/app/agents
      - DATA_DIR=/app/data
    ports:
      - "127.0.0.1:8099:3000"
    volumes:
      - ./agents:/app/agents:ro
      - ./data/openclaw:/app/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  knowledge-scanner:
    build:
      context: ./knowledge-scanner
    container_name: knowledge-scanner
    restart: unless-stopped
    environment:
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      - REDIS_URL=redis://redis:6379
      - TZ=America/Denver
      - SCAN_INTERVAL_HOURS=6
    ports:
      - "127.0.0.1:8100:8100"
    volumes:
      - ./data/knowledge-scanner:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  mission-control:
    build:
      context: ./mission_control
    container_name: mission-control
    restart: unless-stopped
    environment:
      - PORT=8098
      - REDIS_URL=redis://redis:6379
      - TZ=America/Denver
    ports:
      - "0.0.0.0:8098:8098"
    volumes:
      - ./data/mission-control:/data
      - ./data/polymarket:/trading-data:ro
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8098/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  openwebui:
  redis_data:
