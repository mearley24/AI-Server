# =============================================================================
# AI-Server Docker Compose
# Active services: 18
# =============================================================================

services:

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      # Must match requirepass in redis/redis.conf (used by healthcheck only).
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      default:
        ipv4_address: 172.18.0.100
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  vpn:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: vpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - ./polymarket-bot/vpn:/config/wg_confs
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    dns:
      - 1.1.1.1
      - 1.0.0.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8430:8430"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 -W 3 1.1.1.1 || exit 1"]
      interval: 60s
      timeout: 8s
      retries: 3
      start_period: 60s
    mem_limit: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  polymarket-bot:
    build:
      context: ./polymarket-bot
    container_name: polymarket-bot
    restart: unless-stopped
    network_mode: "service:vpn"
    # ports via vpn service (network_mode shares vpn's network stack)
    # Redis + notification-hub use Docker DNS (redis:6379, notification-hub:8095)
    environment:
      - TZ=America/Denver
      - REDIS_URL=${REDIS_URL}
      - PLATFORMS_ENABLED=${PLATFORMS_ENABLED:-polymarket}
      - POLY_PRIVATE_KEY=${POLY_PRIVATE_KEY:-}
      - POLY_PROXY_ADDRESS=${POLY_PROXY_ADDRESS:-}
      - POLY_BUILDER_API_KEY=${POLY_BUILDER_API_KEY:-}
      - POLY_BUILDER_API_SECRET=${POLY_BUILDER_API_SECRET:-}
      - POLY_BUILDER_API_PASSPHRASE=${POLY_BUILDER_API_PASSPHRASE:-}
      - POLY_DRY_RUN=${POLY_DRY_RUN:-true}
      - POLY_ALLOW_LIVE=${POLY_ALLOW_LIVE:-}
      - CVD_ARB_BANKROLL=${CVD_ARB_BANKROLL:-250}
      - POLY_SAFE_ADDRESS=${POLY_SAFE_ADDRESS:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.1.189:11434}
      - OLLAMA_KNOWLEDGE_MODEL=${OLLAMA_KNOWLEDGE_MODEL:-qwen3:8b}
      - OLLAMA_VALIDATE_MODEL=${OLLAMA_VALIDATE_MODEL:-qwen3:8b}
      - OLLAMA_DEBATE_MODEL=${OLLAMA_DEBATE_MODEL:-qwen3:32b}
      - FINANCIAL_DATASETS_API_KEY=${FINANCIAL_DATASETS_API_KEY:-}
      # Notification pipeline — must be "imessage" to send via iMessage
      - NOTIFICATION_CHANNEL=${NOTIFICATION_CHANNEL:-imessage}
      - NOTIFICATION_HUB_URL=${NOTIFICATION_HUB_URL:-http://notification-hub:8095}
      # Redeem resolved positions to USDC.e — interval sec (min 60 in app)
      - REDEEMER_CHECK_INTERVAL_SEC=${REDEEMER_CHECK_INTERVAL_SEC:-180}
      # Debate / tuner — large local models need more than default 10s
      - DEBATE_MAX_DEBATE_TIME_SECONDS=${DEBATE_MAX_DEBATE_TIME_SECONDS:-240}
      - PARAMETER_TUNER_MIN_RESOLVED=${PARAMETER_TUNER_MIN_RESOLVED:-3}
      # Phase 1: Kelly Criterion position sizing
      - KELLY_SIZING_ENABLED=${KELLY_SIZING_ENABLED:-true}
      - KELLY_FRACTION=${KELLY_FRACTION:-0.25}
      - COPYTRADE_BANKROLL=${COPYTRADE_BANKROLL:-500}
      - TREASURY_REINVEST_PCT=${TREASURY_REINVEST_PCT:-0.50}
      # Phase 1: Smart exit parameters
      - EXIT_TP1_PCT=${EXIT_TP1_PCT:-1.00}
      - EXIT_TP2_PCT=${EXIT_TP2_PCT:-1.50}
      - EXIT_SL_PCT=${EXIT_SL_PCT:-0.74}
      - EXIT_TRAILING_PCT=${EXIT_TRAILING_PCT:-0.10}
      - EXIT_TIME_HOURS=${EXIT_TIME_HOURS:-48}
      # Phase 2: Correlation exposure limits
      - CORRELATION_MAX_PCT=${CORRELATION_MAX_PCT:-0.50}
      # Phase 3: LLM trade validation
      - LLM_VALIDATION_ENABLED=${LLM_VALIDATION_ENABLED:-true}
      # Expanded scan configuration
      - COPYTRADE_SCAN_MARKETS=${COPYTRADE_SCAN_MARKETS:-500}
      - COPYTRADE_SCAN_CATEGORIES=${COPYTRADE_SCAN_CATEGORIES:-politics,sports,crypto,science}
      - COPYTRADE_LEADERBOARD_ENABLED=${COPYTRADE_LEADERBOARD_ENABLED:-true}
      - COPYTRADE_MAX_POSITIONS=${COPYTRADE_MAX_POSITIONS:-30}
      - MAX_TRADES_PER_HOUR=${MAX_TRADES_PER_HOUR:-10}
      - MAX_TRADES_PER_WALLET_PER_DAY=${MAX_TRADES_PER_WALLET_PER_DAY:-30}
      - MAX_POSITIONS_PER_CATEGORY=${MAX_POSITIONS_PER_CATEGORY:-15}
      - KRAKEN_API_KEY=${KRAKEN_API_KEY:-}
      - KRAKEN_SECRET=${KRAKEN_SECRET:-}
      - KRAKEN_DRY_RUN=${KRAKEN_DRY_RUN:-true}
      - KRAKEN_TRADING_PAIR=${KRAKEN_TRADING_PAIR:-XRP/USD}
      - SECURITY_MAX_SINGLE_TRADE=${SECURITY_MAX_SINGLE_TRADE:-10}
      - SECURITY_MAX_DAILY_VOLUME=${SECURITY_MAX_DAILY_VOLUME:-100}
      - SECURITY_MAX_DAILY_LOSS=${SECURITY_MAX_DAILY_LOSS:-50}
      - KALSHI_API_KEY=${KALSHI_API_KEY:-}
      - KALSHI_PRIVATE_KEY_PATH=${KALSHI_PRIVATE_KEY_PATH:-/data/kalshi_private_key.pem}
      - KALSHI_ENV=${KALSHI_ENV:-production}
      - CORTEX_URL=http://cortex:8102
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
    volumes:
      - ./data/polymarket:/data
      - ./polymarket-bot/secrets:/app/secrets:ro
      - ./data/kalshi_private_key.pem:/data/kalshi_private_key.pem:ro
    depends_on:
      vpn:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-hub:
        condition: service_healthy
    mem_limit: 1g
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8430/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  proposals:
    build:
      context: ./proposals
    container_name: proposals
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8091:8091"
    volumes:
      - ./data/proposals:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  email-monitor:
    build:
      context: ./email-monitor
    container_name: email-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL}
      - ZOHO_REFRESH_TOKEN=${ZOHO_REFRESH_TOKEN}
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET}
      - ZOHO_ACCOUNT_ID=${ZOHO_ACCOUNT_ID:-2928890000000008002}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORTEX_URL=http://cortex:8102
    ports:
      - "127.0.0.1:8092:8092"
    volumes:
      - ./data/email-monitor:/data
      - ./openclaw:/app/openclaw
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  voice-receptionist:
    build:
      context: ./voice_receptionist
    container_name: voice-receptionist
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - SYMPHONY_PHONE=${SYMPHONY_PHONE}
      - DB_PATH=/app/data/bob.db
    ports:
      - "127.0.0.1:8093:3000"
    volumes:
      - ./data/voice-receptionist:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  calendar-agent:
    build:
      context: ./calendar-agent
    container_name: calendar-agent
    restart: unless-stopped
    environment:
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET}
      - ZOHO_REFRESH_TOKEN=${ZOHO_REFRESH_TOKEN}
      - ZOHO_CALENDAR_UID=${ZOHO_CALENDAR_UID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.1.189:11434}
      - OLLAMA_ANALYSIS_MODEL=${OLLAMA_ANALYSIS_MODEL:-qwen3:8b}
      - REDIS_URL=${REDIS_URL}
      - TZ=America/Denver
    ports:
      - "127.0.0.1:8094:8094"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8094/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  notification-hub:
    build:
      context: ./notification-hub
    container_name: notification-hub
    restart: unless-stopped
    environment:
      - NOTIFICATION_CHANNEL=${NOTIFICATION_CHANNEL:-imessage}
      - IMESSAGE_BRIDGE_URL=http://host.docker.internal:8199
      - OWNER_PHONE_NUMBER=${OWNER_PHONE_NUMBER:-}
      - MATT_PHONE_NUMBER=${MATT_PHONE_NUMBER:-}
      - SYMPHONY_EMAIL=${SYMPHONY_EMAIL:-info@symphonysh.com}
      - ZOHO_REFRESH_TOKEN=${ZOHO_REFRESH_TOKEN:-}
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID:-}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET:-}
      - ZOHO_MAIL_ACCOUNT_ID=${ZOHO_MAIL_ACCOUNT_ID:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_OWNER_CHAT_ID=${TELEGRAM_OWNER_CHAT_ID:-}
      - REDIS_URL=${REDIS_URL}
      - CORTEX_URL=http://cortex:8102
    ports:
      - "127.0.0.1:8095:8095"
    volumes:
      - ./data/notification-hub:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  dtools-bridge:
    build:
      context: ./integrations/dtools
    container_name: dtools-bridge
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - DTOOLS_API_KEY=${DTOOLS_API_KEY}
      - DTOOLS_BASE_URL=${DTOOLS_BASE_URL:-https://api.d-tools.com/v2}
      - DTOOLS_CLOUD_API_KEY=${DTOOLS_CLOUD_API_KEY:-}
      - DTOOLS_BRIDGE_PORT=5050
      - LOG_LEVEL=INFO
    ports:
      - "127.0.0.1:8096:5050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5050/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  clawwork:
    build:
      context: ./clawwork
      dockerfile: Dockerfile.clawwork
    container_name: clawwork
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
      - TZ=America/Denver
    ports:
      - "127.0.0.1:8097:8097"
    volumes:
      - ./data/clawwork:/root/.symphony
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8097/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  openclaw:
    build:
      context: ./openclaw
    container_name: openclaw
    restart: unless-stopped
    environment:
      - PORT=3000
      - LOG_LEVEL=info
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.1.189:11434}
      - OLLAMA_ANALYSIS_MODEL=${OLLAMA_ANALYSIS_MODEL:-qwen3:8b}
      - CONDUCTOR_MODEL=${CONDUCTOR_MODEL:-claude-sonnet-4-5}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - REDIS_URL=${REDIS_URL}
      - AGENTS_DIR=/app/agents
      - DATA_DIR=/app/data
      - DTOOLS_API_KEY=${DTOOLS_API_KEY:-}
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
      - SYMPHONY_DOCS_PATH=${SYMPHONY_DOCS_PATH:-}
      - APPROVAL_BRIDGE_SECRET=${APPROVAL_BRIDGE_SECRET:-}
      - EMAIL_MONITOR_DB_PATH=/data/email-monitor/emails.db
      # Polymarket API is on the vpn container (not 127.0.0.1 from inside this container)
      - POLYMARKET_BOT_URL=http://vpn:8430
      - CORTEX_URL=http://cortex:8102
    ports:
      - "127.0.0.1:8099:3000"
    volumes:
      # Host source (avoid stale image — OpenClaw code is not copied on every pull)
      - ./openclaw:/app
      - ./agents:/app/agents:ro
      - ./data/openclaw:/app/data
      - ./data/polymarket:/app/data/polymarket
      - ./data/email-monitor:/data/email-monitor:ro
      - ./integrations/dtools:/app/integrations/dtools:ro
      - ./tools:/app/tools:ro
      - ./knowledge:/app/knowledge:ro
      - "${SYMPHONY_DOCS_PATH:-/Users/bob/Library/Mobile Documents/com~apple~CloudDocs/Symphony SH}:/data/symphony_docs:ro"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  cortex:
    build:
      context: .
      dockerfile: cortex/Dockerfile
    container_name: cortex
    restart: unless-stopped
    ports:
      - "127.0.0.1:8102:8102"
    volumes:
      - ./cortex:/app/cortex
      - ./data/cortex:/data/cortex
      - ./data/client_intel:/data/client_intel
      - ./data/openclaw:/app/data/openclaw:ro
      - ./polymarket-bot/knowledge:/app/knowledge:ro
      - ./data/x_intake:/data/x_intake:ro
      - ./data/audio_intake:/data/audio_intake:ro
      - ./tools:/app/tools:ro
      - ./config:/app/config:ro
      - ./ops/verification:/app/ops/verification:ro
      - ./ops/runbooks:/app/ops/runbooks:ro
      - ./ops/work_queue:/app/ops/work_queue:ro
      - ./.cursor/prompts:/app/.cursor/prompts:ro
      - ./STATUS_REPORT.md:/app/STATUS_REPORT.md:ro
      - ./HANDOFF.md:/app/HANDOFF.md:ro
      - ./ops/BACKLOG.md:/app/ops/BACKLOG.md:ro
      - ./ops/PROCESS_POLICY.md:/app/ops/PROCESS_POLICY.md:ro
      - ./data/task_runner:/data/task_runner:ro
      - ./data/x_api:/data/x_api:rw
      - ./data/vault:/data/vault:rw
    environment:
      - REDIS_URL=${REDIS_URL}
      - CORTEX_PORT=8102
      - TZ=America/Denver
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.1.189:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - POLYMARKET_BOT_URL=http://vpn:8430
      - EMAIL_MONITOR_URL=http://email-monitor:8092
      - CALENDAR_AGENT_URL=http://calendar-agent:8094
      - OPENCLAW_URL=http://openclaw:3000
      - BLUEBUBBLES_SERVER_URL=${BLUEBUBBLES_SERVER_URL:-}
      - BLUEBUBBLES_API_PASSWORD=${BLUEBUBBLES_API_PASSWORD:-}
      - X_API_BEARER_TOKEN=${X_API_BEARER_TOKEN:-}
      - X_API_CLIENT_ID=${X_API_CLIENT_ID:-}
      - X_API_ACCESS_TOKEN=${X_API_ACCESS_TOKEN:-}
      - X_API_REFRESH_TOKEN=${X_API_REFRESH_TOKEN:-}
      - X_USER_ID=${X_USER_ID:-}
      - X_DAILY_READ_LIMIT=${X_DAILY_READ_LIMIT:-100}
      - X_ENABLED=${X_ENABLED:-0}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8102/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 2g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    env_file:
      - .env
  intel-feeds:
    build:
      context: ./integrations/intel_feeds
    container_name: intel-feeds
    restart: unless-stopped
    environment:
      - REDIS_URL=${REDIS_URL}
      - TZ=America/Denver
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./data/intel_feeds:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  x-intake:
    build:
      context: ./integrations/x_intake
    container_name: x-intake
    restart: unless-stopped
    ports:
      - "127.0.0.1:8101:8101"
    volumes:
      - ./data/x_intake:/data/x_intake
      - ./data/transcripts:/data/transcripts
    environment:
      - REDIS_URL=${REDIS_URL}
      - IMESSAGE_BRIDGE_URL=http://host.docker.internal:8199
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_ANALYSIS_MODEL=${OLLAMA_ANALYSIS_MODEL:-qwen3:8b}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - TRANSCRIPT_DIR=/data/transcripts
      - CORTEX_URL=http://cortex:8102
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - CORTEX_REPLY_DRY_RUN=${CORTEX_REPLY_DRY_RUN:-1}
      - ALLOWED_TEST_RECIPIENTS=${ALLOWED_TEST_RECIPIENTS:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health')"]
      interval: 30s
      timeout: 120s
      retries: 5
      start_period: 15s
    mem_limit: 256m
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=memory
      - CACHE_EXPIRE=600
      - REQUEST_TIMEOUT=30000
      - PROXY_URI=
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:1200',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    networks:
      - default
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  x-alpha-collector:
    build:
      context: ./integrations/x_alpha_collector
    container_name: x-alpha-collector
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - RSSHUB_URL=http://rsshub:1200
      - X_INTAKE_URL=http://x-intake:8101
      - REDIS_URL=${REDIS_URL}
      - POLL_INTERVAL_SECONDS=600
      - SEEN_DB_PATH=/data/x_alpha_seen.json
      - IMESSAGE_BRIDGE_URL=http://host.docker.internal:8199
    volumes:
      - ./data/x_intake:/data
    depends_on:
      rsshub:
        condition: service_healthy
      x-intake:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY2'\nimport os, sys\nneedle = 'collector.py'\nfor pid in os.listdir('/proc'):\n    if pid.isdigit():\n        try:\n            cmd = open(f'/proc/{pid}/cmdline', 'rb').read().replace(b'\\x00', b' ').decode('utf-8', 'ignore')\n        except Exception:\n            continue\n        if needle in cmd:\n            sys.exit(0)\nsys.exit(1)\nPY2"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  client-portal:
    build: ./client-portal
    container_name: client-portal
    restart: unless-stopped
    # No host port — accessed internally. dtools-bridge uses 8096 on the host.
    volumes:
      - ./data:/data
    environment:
      - PORTAL_SECRET=${PORTAL_SECRET:-symphonysh-portal-secret}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8096/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  cortex-autobuilder:
    build:
      context: .
      dockerfile: integrations/cortex_autobuilder/Dockerfile
    container_name: cortex-autobuilder
    ports:
      - "127.0.0.1:8115:8115"
    volumes:
      - ./integrations:/app/integrations
      - ./openclaw:/app/openclaw
      - ./data:/data
    environment:
      - CORTEX_URL=http://cortex:8102
      - REDIS_URL=${REDIS_URL}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.1.189:11434}
      - LLM_ROUTER_MODE=local_first
      - AUTOBUILDER_PORT=8115
      - MAX_QUESTIONS_PER_HOUR=30
      - GENERATION_INTERVAL_MINUTES=60
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-120}
    depends_on:
      cortex:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8115/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 256m
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  default:
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  redis_data:
