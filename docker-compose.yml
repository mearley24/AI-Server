# =============================================================================
# AI-Server Docker Compose
# Active services: 15
# =============================================================================

services:

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - openwebui:/app/backend/data
      - "./data:/data"
    environment:
      - WEBUI_NAME=AI-Server
      - ENABLE_API_KEYS=True
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  remediator:
    build:
      context: ./remediator
    container_name: remediator
    restart: unless-stopped
    env_file:
      - ./remediator/.env
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/health | grep -q ok || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      # Must match requirepass in redis/redis.conf (used by healthcheck only).
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      default:
        ipv4_address: 172.18.0.100
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  vpn:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: vpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - ./polymarket-bot/vpn:/config/wg_confs
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8430:8430"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ping -c 1 1.1.1.1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  polymarket-bot:
    build:
      context: ./polymarket-bot
    container_name: polymarket-bot
    restart: unless-stopped
    network_mode: "service:vpn"
    # ports via vpn service (network_mode shares vpn's network stack)
    # Redis + notification-hub use Docker DNS (redis:6379, notification-hub:8095)
    environment:
      - TZ=America/Denver
      - REDIS_URL=redis://:d19c9b0faebeee9927555eb8d6b28ec9@redis:6379
      - PLATFORMS_ENABLED=${PLATFORMS_ENABLED:-polymarket}
      - POLY_PRIVATE_KEY=${POLY_PRIVATE_KEY:-}
      - POLY_PROXY_ADDRESS=${POLY_PROXY_ADDRESS:-}
      - POLY_BUILDER_API_KEY=${POLY_BUILDER_API_KEY:-}
      - POLY_BUILDER_API_SECRET=${POLY_BUILDER_API_SECRET:-}
      - POLY_BUILDER_API_PASSPHRASE=${POLY_BUILDER_API_PASSPHRASE:-}
      - POLY_DRY_RUN=${POLY_DRY_RUN:-false}
      - CVD_ARB_BANKROLL=${CVD_ARB_BANKROLL:-250}
      - POLY_SAFE_ADDRESS=${POLY_SAFE_ADDRESS:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.1.199:11434}
      - OLLAMA_KNOWLEDGE_MODEL=${OLLAMA_KNOWLEDGE_MODEL:-qwen3:8b}
      - OLLAMA_VALIDATE_MODEL=${OLLAMA_VALIDATE_MODEL:-qwen3:8b}
      - OLLAMA_DEBATE_MODEL=${OLLAMA_DEBATE_MODEL:-qwen3:32b}
      - FINANCIAL_DATASETS_API_KEY=${FINANCIAL_DATASETS_API_KEY:-}
      # Notification pipeline — must be "imessage" to send via iMessage
      - NOTIFICATION_CHANNEL=${NOTIFICATION_CHANNEL:-imessage}
      - NOTIFICATION_HUB_URL=${NOTIFICATION_HUB_URL:-http://notification-hub:8095}
      # Debate / tuner — large local models need more than default 10s
      - DEBATE_MAX_DEBATE_TIME_SECONDS=${DEBATE_MAX_DEBATE_TIME_SECONDS:-240}
      - PARAMETER_TUNER_MIN_RESOLVED=${PARAMETER_TUNER_MIN_RESOLVED:-3}
      # Phase 1: Kelly Criterion position sizing
      - KELLY_SIZING_ENABLED=${KELLY_SIZING_ENABLED:-true}
      - KELLY_FRACTION=${KELLY_FRACTION:-0.25}
      - COPYTRADE_BANKROLL=${COPYTRADE_BANKROLL:-500}
      # Phase 1: Smart exit parameters
      - EXIT_TP1_PCT=${EXIT_TP1_PCT:-1.00}
      - EXIT_TP2_PCT=${EXIT_TP2_PCT:-1.50}
      - EXIT_SL_PCT=${EXIT_SL_PCT:-0.74}
      - EXIT_TRAILING_PCT=${EXIT_TRAILING_PCT:-0.10}
      - EXIT_TIME_HOURS=${EXIT_TIME_HOURS:-48}
      # Phase 2: Correlation exposure limits
      - CORRELATION_MAX_PCT=${CORRELATION_MAX_PCT:-0.50}
      # Phase 3: LLM trade validation
      - LLM_VALIDATION_ENABLED=${LLM_VALIDATION_ENABLED:-true}
      # Expanded scan configuration
      - COPYTRADE_SCAN_MARKETS=${COPYTRADE_SCAN_MARKETS:-500}
      - COPYTRADE_SCAN_CATEGORIES=${COPYTRADE_SCAN_CATEGORIES:-politics,sports,crypto,science}
      - COPYTRADE_LEADERBOARD_ENABLED=${COPYTRADE_LEADERBOARD_ENABLED:-true}
      - COPYTRADE_MAX_POSITIONS=${COPYTRADE_MAX_POSITIONS:-100}
      - MAX_TRADES_PER_HOUR=${MAX_TRADES_PER_HOUR:-10}
      - MAX_TRADES_PER_WALLET_PER_DAY=${MAX_TRADES_PER_WALLET_PER_DAY:-30}
      - MAX_POSITIONS_PER_CATEGORY=${MAX_POSITIONS_PER_CATEGORY:-50}
      - KRAKEN_API_KEY=${KRAKEN_API_KEY:-}
      - KRAKEN_SECRET=${KRAKEN_SECRET:-}
      - KRAKEN_TRADING_PAIR=${KRAKEN_TRADING_PAIR:-XRP/USD}
    volumes:
      - ./data/polymarket:/data
      - ./polymarket-bot/secrets:/app/secrets:ro
    depends_on:
      vpn:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-hub:
        condition: service_healthy
    mem_limit: 2g
    mem_reservation: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8430/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  proposals:
    build:
      context: ./proposals
    container_name: proposals
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8091:8091"
    volumes:
      - ./data/proposals:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  email-monitor:
    build:
      context: ./email-monitor
    container_name: email-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:d19c9b0faebeee9927555eb8d6b28ec9@redis:6379
      - ZOHO_REFRESH_TOKEN=${ZOHO_REFRESH_TOKEN}
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID:-1000.MO1TLB2AXFHH2YABDD2TSSIJ68SK5J}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET:-1be316a2f0448b2a62bc9659f5a4e01fc800936810}
      - ZOHO_ACCOUNT_ID=${ZOHO_ACCOUNT_ID:-2928890000000008002}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "127.0.0.1:8092:8092"
    volumes:
      - ./data/email-monitor:/data
      - ./openclaw:/app/openclaw
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  voice-receptionist:
    build:
      context: ./voice_receptionist
    container_name: voice-receptionist
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - SYMPHONY_PHONE=${SYMPHONY_PHONE}
      - DB_PATH=/app/data/bob.db
    ports:
      - "127.0.0.1:8093:3000"
    volumes:
      - ./data/voice-receptionist:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  calendar-agent:
    build:
      context: ./calendar-agent
    container_name: calendar-agent
    restart: unless-stopped
    environment:
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET}
      - ZOHO_REFRESH_TOKEN=${ZOHO_REFRESH_TOKEN}
      - ZOHO_CALENDAR_UID=${ZOHO_CALENDAR_UID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.1.199:11434}
      - OLLAMA_ANALYSIS_MODEL=${OLLAMA_ANALYSIS_MODEL:-qwen3:8b}
      - REDIS_URL=redis://:d19c9b0faebeee9927555eb8d6b28ec9@redis:6379
      - TZ=America/Denver
    ports:
      - "127.0.0.1:8094:8094"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8094/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  notification-hub:
    build:
      context: ./notification-hub
    container_name: notification-hub
    restart: unless-stopped
    environment:
      - NOTIFICATION_CHANNEL=${NOTIFICATION_CHANNEL:-imessage}
      - IMESSAGE_BRIDGE_URL=http://host.docker.internal:8199
      - OWNER_PHONE_NUMBER=${OWNER_PHONE_NUMBER:-}
      - MATT_PHONE_NUMBER=${MATT_PHONE_NUMBER:-}
      - SYMPHONY_EMAIL=${SYMPHONY_EMAIL:-info@symphonysh.com}
      - ZOHO_REFRESH_TOKEN=${ZOHO_REFRESH_TOKEN:-}
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID:-}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET:-}
      - ZOHO_MAIL_ACCOUNT_ID=${ZOHO_MAIL_ACCOUNT_ID:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_OWNER_CHAT_ID=${TELEGRAM_OWNER_CHAT_ID:-}
      - REDIS_URL=redis://:d19c9b0faebeee9927555eb8d6b28ec9@redis:6379
    ports:
      - "127.0.0.1:8095:8095"
    volumes:
      - ./data/notification-hub:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  dtools-bridge:
    build:
      context: ./integrations/dtools
    container_name: dtools-bridge
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - DTOOLS_API_KEY=${DTOOLS_API_KEY}
      - DTOOLS_BASE_URL=${DTOOLS_BASE_URL:-https://api.d-tools.com/v2}
      - DTOOLS_CLOUD_API_KEY=${DTOOLS_CLOUD_API_KEY:-}
      - DTOOLS_BRIDGE_PORT=5050
      - LOG_LEVEL=INFO
    ports:
      - "127.0.0.1:8096:5050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5050/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  clawwork:
    build:
      context: ./clawwork
      dockerfile: Dockerfile.clawwork
    container_name: clawwork
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
      - TZ=America/Denver
    ports:
      - "127.0.0.1:8097:8097"
    volumes:
      - ./data/clawwork:/root/.symphony
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8097/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  openclaw:
    build:
      context: ./openclaw
    container_name: openclaw
    restart: unless-stopped
    environment:
      - PORT=3000
      - LOG_LEVEL=info
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.1.199:11434}
      - OLLAMA_ANALYSIS_MODEL=${OLLAMA_ANALYSIS_MODEL:-qwen3:8b}
      - CONDUCTOR_MODEL=${CONDUCTOR_MODEL:-claude-sonnet-4-5}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - REDIS_URL=redis://:d19c9b0faebeee9927555eb8d6b28ec9@redis:6379
      - AGENTS_DIR=/app/agents
      - DATA_DIR=/app/data
      - DTOOLS_API_KEY=${DTOOLS_API_KEY:-}
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
      - SYMPHONY_DOCS_PATH=${SYMPHONY_DOCS_PATH:-}
      - APPROVAL_BRIDGE_SECRET=${APPROVAL_BRIDGE_SECRET:-}
      - EMAIL_MONITOR_DB_PATH=/data/email-monitor/emails.db
      # Polymarket API is on the vpn container (not 127.0.0.1 from inside this container)
      - POLYMARKET_BOT_URL=http://vpn:8430
    ports:
      - "127.0.0.1:8099:3000"
    volumes:
      # Host source (avoid stale image — OpenClaw code is not copied on every pull)
      - ./openclaw:/app
      - ./agents:/app/agents:ro
      - ./data/openclaw:/app/data
      - ./data/polymarket:/app/data/polymarket
      - ./data/email-monitor:/data/email-monitor:ro
      - ./integrations/dtools:/app/integrations/dtools:ro
      - ./tools:/app/tools:ro
      - ./knowledge:/app/knowledge:ro
      - "${SYMPHONY_DOCS_PATH:-/Users/bob/Library/Mobile Documents/com~apple~CloudDocs/Symphony SH}:/data/symphony_docs:ro"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  knowledge-scanner:
    build:
      context: ./knowledge-scanner
    container_name: knowledge-scanner
    restart: unless-stopped
    environment:
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.1.199:11434}
      - OLLAMA_ANALYSIS_MODEL=${OLLAMA_ANALYSIS_MODEL:-qwen3:8b}
      - REDIS_URL=redis://:d19c9b0faebeee9927555eb8d6b28ec9@redis:6379
      - TZ=America/Denver
      - SCAN_INTERVAL_HOURS=6
    ports:
      - "127.0.0.1:8100:8100"
    volumes:
      - ./data/knowledge-scanner:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  mission-control:
    build:
      context: ./mission_control
    container_name: mission-control
    restart: unless-stopped
    environment:
      - PORT=8098
      - REDIS_URL=redis://:d19c9b0faebeee9927555eb8d6b28ec9@redis:6379
      - TZ=America/Denver
      - MISSION_CONTROL_TOKEN=${MISSION_CONTROL_TOKEN:-}
    ports:
      - "127.0.0.1:8098:8098"
    volumes:
      # Host source so new API routes (e.g. /api/events-log) apply without image rebuild
      - ./mission_control:/app
      - ./data/mission-control:/data
      - ./data/polymarket:/trading-data:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8098/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  intel-feeds:
    build:
      context: ./integrations/intel_feeds
    container_name: intel-feeds
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://:d19c9b0faebeee9927555eb8d6b28ec9@redis:6379
      - TZ=America/Denver
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./data/intel_feeds:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  context-preprocessor:
    build:
      context: ./context-preprocessor
    container_name: context-preprocessor
    restart: unless-stopped
    ports:
      - "127.0.0.1:8028:8028"
    environment:
      - TZ=America/Denver
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8028/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  x-intake:
    build:
      context: ./integrations/x_intake
    container_name: x-intake
    restart: unless-stopped
    ports:
      - "127.0.0.1:8101:8101"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - IMESSAGE_BRIDGE_URL=http://host.docker.internal:8199
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://192.168.1.199:11434}
      - OLLAMA_ANALYSIS_MODEL=${OLLAMA_ANALYSIS_MODEL:-qwen3:8b}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  default:
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  openwebui:
  redis_data:
