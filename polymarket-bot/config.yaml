# Polymarket Trading Bot — Strategy Configuration
# Env vars override values set here.
#
# LIVE TRADING GATE: to enable live trading you must ALSO set:
#   POLY_ALLOW_LIVE=I_UNDERSTAND_REAL_MONEY_RISK
# Setting dry_run: false alone is NOT sufficient — the startup gate will
# override it and force paper mode if POLY_ALLOW_LIVE is not set.

# Observer mode — default true (paper trading). Requires explicit gate to go live.
dry_run: true

# Paper trade ledger (keep enabled alongside live for parallel tracking)
paper_ledger:
  enabled: true
  file: /data/paper_trades.jsonl
  score_resolved_markets: true  # retroactively check if paper trades would have profited
  scoring_interval_seconds: 3600  # check resolved markets every hour

# Market scanning
scan_tokens:
  - BTC
  - ETH
  - SOL

# Strategy: Stink Bid
strategies:
  stink_bid:
    drop_threshold: 0.15     # Place bid this far below current price
    take_profit: 0.10        # Exit when price rises this much above entry
    stop_loss: 0.08          # Exit when price drops this much below entry
    size: 10.0               # Position size in USDC
    timeframes:
      - 5m
      - 15m

  # Strategy: Flash Crash
  flash_crash:
    drop_threshold: 0.30     # Price drop to trigger buy (e.g. 0.30 = 30 cents)
    window_seconds: 10       # Time window to detect the drop
    take_profit: 0.15        # Exit when price rises this much
    stop_loss: 0.10          # Exit when price drops this much
    size: 10.0               # Position size in USDC
    timeframes:
      - 5m
      - 15m

# Strategy: Weather Trader (NOAA + AccuWeather)
weather_trader:
  enabled: false
  noaa_stations:
    - KDEN  # Denver
    - KJFK  # New York JFK
    - KLAX  # Los Angeles
  edge_threshold: 0.10  # minimum edge (10%) to enter
  max_position_size: 10.0
  check_interval_seconds: 300  # check every 5 min
  accuweather_api_key_env: ACCUWEATHER_API_KEY
  use_multi_source_confirmation: true
  min_sources_agree: 2  # both NOAA and AccuWeather must agree
  scan_all_weather_types: true  # not just temperature — frost, precip, wind
  rare_event_scanner:
    enabled: true
    max_probability: 0.10  # scan contracts priced below 10%
    min_forecast_edge: 0.15  # forecast suggests >= 15% more likely than market
    max_position_size: 25.0  # small positions for rare events
  min_time_to_expiry_minutes: 30
  take_profit_at_fair_value: true
  stop_loss_pct: 0.05

# Strategy: Sports Arbitrage
sports_arb:
  enabled: false
  scan_interval_seconds: 45
  arb_threshold: 0.98  # combined price must be below this
  max_position_per_side: 5000.0
  slippage_tolerance: 0.005
  min_liquidity_shares: 100  # minimum order book depth
  use_fok_orders: true  # Fill-or-Kill for simultaneous execution
  market_types:
    - sports
    - esports

# Order Flow Analyzer
order_flow:
  enabled: true
  imbalance_threshold: 2.5  # bid:ask ratio to trigger signal
  compression_atr_periods: 14
  compression_squeeze_factor: 0.5  # ATR < 50% of 20-period avg
  delta_divergence_threshold: 0.3  # 30% divergence between price and CVD
  lookback_candles: 50

# Security
# Limits are conservative for a small test account (≤$500).
# Raise these only after verifying live trading works correctly over ≥48h.
security:
  vault_enabled: true
  vault_path: /data/vault.enc
  max_single_trade: 10.0        # $10 max per trade
  max_daily_volume: 100.0       # $100 max daily trading volume
  max_daily_loss: 50.0          # kill switch fires if down $50 in a day
  max_orders_per_minute: 5
  max_api_calls_per_minute: 60
  audit_retention_days: 90
  kill_switch_enabled: true

# BTC price feed source for latency detection and correlation strategies
btc_feed_source: kraken

# Latency Detector (BTC-Polymarket spread)
latency_detector:
  enabled: true
  binance_symbol: btcusdt  # legacy, only used when btc_feed_source=binance
  momentum_window_seconds: 10
  price_change_threshold_pct: 0.11  # 0.11% BTC move triggers detection
  entry_delay_ms: 9000  # wait 9 seconds after detection before entering
  entry_window_ms: 7000  # window closes 16 seconds after detection (9+7)
  polymarket_lag_threshold_seconds: 3  # if PM hasn't repriced within 3s
  signal_cooldown_seconds: 30
  track_timing_metrics: true

# Debate Engine (Bull/Bear/Judge pre-trade validation)
debate_engine:
  enabled: true
  model: claude-3-5-sonnet-20241022  # uses CONDUCTOR_MODEL from .env if not set
  min_position_for_debate: 25.0  # only debate trades >= $25
  confidence_threshold: 0.65  # minimum confidence to proceed
  max_debate_time_seconds: 10

# Redis (for TA sidecar signals)
redis_url: redis://redis:6379

# ── Multi-platform Configuration ─────────────────────────────────
platforms_enabled: "kalshi,crypto"

# Kalshi — CFTC-regulated prediction markets
kalshi:
  environment: production
  dry_run: true
  scan_interval: 300.0       # market scan interval (seconds)
  edge_threshold: 0.08       # minimum edge to trade
  max_position_size: 20.0    # max contracts per position
  weather_enabled: true      # Kalshi weather strategy
  fed_enabled: true          # Kalshi Fed/economics strategy

# Crypto — spot trading via CCXT
crypto:
  exchange: kraken
  dry_run: true
  symbols:
    - XRP/USD
    - XCN/USD
    - PI/USD
  trade_amount_usd: 50.0
  max_position_usd: 500.0
  max_total_exposure_usd: 2000.0
  poll_interval_seconds: 60.0
  btc_correlation_enabled: true
  mean_reversion_enabled: true
  momentum_enabled: false     # Phase 2 — enable when tested
  cvd_enabled: true
  cvd_lookback_trades: 500
  cvd_divergence_threshold: 0.02
  cvd_poll_interval: 120

# ── Notifications ─────────────────────────────────────────────────
notifications:
  channel: imessage            # route via iMessage/notification-hub
  # iMessage notifications are routed via Redis pub/sub to notification-hub,
  # which dispatches via the native AppleScript bridge on the host.
