<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto-28 · Context Preprocessor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1a1a2e;
      --bg-surface:  #16213e;
      --bg-input:    #0f0f23;
      --border:      #2a2a4a;
      --border-focus:#4a90d9;
      --text:        #e0e0e0;
      --text-muted:  #7a7a9a;
      --text-dim:    #4a4a6a;
      --accent:      #4a90d9;
      --accent-hover:#5aa3f0;
      --accent-2:    #7c5cbf;
      --success:     #3dba7a;
      --warning:     #e0a040;
      --danger:      #d9534f;
      --mono:        'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --sans:        'Inter', system-ui, sans-serif;
      --radius:      6px;
      --gap:         16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ───────────────────────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
    }

    .logo-text {
      font-family: var(--mono);
      font-weight: 600;
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 4px;
    }

    .header-spacer { flex: 1; }

    .badge {
      font-family: var(--mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    }

    /* ── Main workspace ───────────────────────────────────────────────── */
    .workspace {
      display: flex;
      flex: 1;
      min-height: 0;
      gap: 0;
    }

    /* ── Panels ───────────────────────────────────────────────────────── */
    .panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      min-height: 0;
    }

    .panel + .panel {
      border-left: 1px solid var(--border);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
    }

    .panel-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .stats {
      display: flex;
      gap: 12px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .stats .stat-val { color: var(--text-muted); }

    textarea {
      flex: 1;
      width: 100%;
      padding: 14px;
      background: var(--bg-input);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.6;
      tab-size: 2;
    }

    textarea::placeholder { color: var(--text-dim); }

    textarea:focus {
      box-shadow: inset 2px 0 0 var(--border-focus);
    }

    #output-area {
      color: #c8daf5;
    }

    /* ── Center column ────────────────────────────────────────────────── */
    .center-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 10px;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      width: 80px;
    }

    /* ── Buttons ──────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      text-decoration: none;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      padding: 14px 10px;
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    .btn-primary:active { transform: rotate(180deg) scale(0.97); }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      padding: 14px 10px;
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    .btn-secondary:active { transform: rotate(180deg) scale(0.97); }

    .btn-secondary:hover {
      background: color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .btn-clear {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      padding: 10px 8px;
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    .btn-clear:active { transform: rotate(180deg) scale(0.97); }

    .btn-clear:hover {
      color: var(--text-muted);
      border-color: var(--text-dim);
    }

    /* ── Footer / status bar ──────────────────────────────────────────── */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 6px 16px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-dim);
      flex-wrap: wrap;
    }

    .statusbar .sep { color: var(--border); }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
    }

    .chip-format {
      background: color-mix(in srgb, var(--accent-2) 15%, transparent);
      color: #b48ee0;
      border: 1px solid color-mix(in srgb, var(--accent-2) 25%, transparent);
    }

    .chip-reduction {
      background: color-mix(in srgb, var(--success) 15%, transparent);
      color: var(--success);
      border: 1px solid color-mix(in srgb, var(--success) 25%, transparent);
    }

    .chip-reduction.neutral {
      background: color-mix(in srgb, var(--text-muted) 10%, transparent);
      color: var(--text-muted);
      border-color: var(--border);
    }

    .chip-reduction.negative {
      background: color-mix(in srgb, var(--warning) 12%, transparent);
      color: var(--warning);
      border-color: color-mix(in srgb, var(--warning) 25%, transparent);
    }

    .chip-trimmed {
      background: color-mix(in srgb, var(--warning) 12%, transparent);
      color: var(--warning);
      border: 1px solid color-mix(in srgb, var(--warning) 25%, transparent);
    }

    #status-msg {
      color: var(--text-muted);
      transition: color 0.3s;
    }

    #status-msg.success { color: var(--success); }
    #status-msg.error   { color: var(--danger); }

    .spacer { flex: 1; }

    /* ── Spinner ──────────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .loading .spinner { display: block; }

    /* ── Copy feedback ────────────────────────────────────────────────── */
    @keyframes fadeout {
      0%   { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .copy-feedback {
      animation: fadeout 1.6s ease-out forwards;
    }

    /* ── Responsive — phone (stacks vertically) ───────────────────────── */
    @media (max-width: 768px) {
      .app { height: auto; min-height: 100vh; overflow: auto; }

      .workspace {
        flex-direction: column;
        height: auto;
        gap: 0;
      }

      .panel + .panel { border-left: none; border-top: 1px solid var(--border); }

      .center-col {
        flex-direction: row;
        width: 100%;
        height: auto;
        padding: 10px 14px;
        border-left: none;
        border-right: none;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        justify-content: flex-start;
        gap: 10px;
      }

      .btn-primary,
      .btn-secondary,
      .btn-clear {
        writing-mode: horizontal-tb;
        transform: none;
        padding: 8px 16px;
      }

      .btn-primary:active,
      .btn-secondary:active,
      .btn-clear:active { transform: scale(0.97); }

      textarea { min-height: 220px; }

      .statusbar { gap: 10px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <!-- Inline SVG logo -->
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none" aria-label="Auto-28 logo" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
        <!-- Filter funnel -->
        <path d="M7 8h18l-7 9v7l-4-2v-5L7 8z" fill="none" stroke="#4a90d9" stroke-width="1.5" stroke-linejoin="round"/>
        <!-- Sparkle / compress lines -->
        <line x1="23" y1="19" x2="27" y2="19" stroke="#7c5cbf" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="25" y1="17" x2="25" y2="21" stroke="#7c5cbf" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">Auto-28<span class="logo-sub">context preprocessor</span></span>
    </div>
    <div class="header-spacer"></div>
    <span class="badge">port 8028</span>
  </header>

  <!-- ── Workspace ──────────────────────────────────────────────────── -->
  <div class="workspace">

    <!-- Input panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Raw Input</span>
        <div class="stats">
          <span><span class="stat-val" id="in-chars">0</span> chars</span>
          <span><span class="stat-val" id="in-lines">0</span> lines</span>
        </div>
      </div>
      <textarea
        id="input-area"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        placeholder="Paste terminal output, logs, emails, tracebacks, JSON… anything.&#10;&#10;Press Process → to clean and structure it."
      ></textarea>
    </div>

    <!-- Center controls -->
    <div class="center-col">
      <button class="btn btn-primary" id="process-btn" title="Process input (Ctrl+Enter)">
        Process
      </button>
      <button class="btn btn-secondary" id="copy-btn" title="Copy output to clipboard">
        Copy
      </button>
      <button class="btn btn-clear" id="clear-btn" title="Clear both panels">
        Clear
      </button>
    </div>

    <!-- Output panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Processed Output</span>
        <div class="stats">
          <span><span class="stat-val" id="out-chars">0</span> chars</span>
          <span><span class="stat-val" id="out-lines">0</span> lines</span>
        </div>
      </div>
      <textarea
        id="output-area"
        spellcheck="false"
        autocomplete="off"
        readonly
        placeholder="Cleaned, structured output will appear here.&#10;&#10;Ready to paste into Perplexity Computer."
      ></textarea>
    </div>

  </div><!-- /workspace -->

  <!-- ── Status bar ─────────────────────────────────────────────────── -->
  <div class="statusbar">
    <div class="spinner" id="spinner"></div>
    <span id="status-msg">Ready</span>
    <span class="sep">│</span>
    <span id="format-chip"></span>
    <span id="reduction-chip"></span>
    <span id="trimmed-chip"></span>
    <span class="spacer"></span>
    <span style="color: var(--text-dim)">Ctrl+Enter to process</span>
  </div>

</div><!-- /app -->

<script>
(function () {
  'use strict';

  // ── Elements ─────────────────────────────────────────────────────────
  const inputArea    = document.getElementById('input-area');
  const outputArea   = document.getElementById('output-area');
  const processBtn   = document.getElementById('process-btn');
  const copyBtn      = document.getElementById('copy-btn');
  const clearBtn     = document.getElementById('clear-btn');
  const statusMsg    = document.getElementById('status-msg');
  const spinner      = document.getElementById('spinner');
  const inChars      = document.getElementById('in-chars');
  const inLines      = document.getElementById('in-lines');
  const outChars     = document.getElementById('out-chars');
  const outLines     = document.getElementById('out-lines');
  const formatChip   = document.getElementById('format-chip');
  const reductionChip = document.getElementById('reduction-chip');
  const trimmedChip  = document.getElementById('trimmed-chip');

  // ── Helpers ───────────────────────────────────────────────────────────
  function countLines(text) {
    if (!text) return 0;
    return text.split('\n').length;
  }

  function updateInputStats() {
    const t = inputArea.value;
    inChars.textContent = t.length.toLocaleString();
    inLines.textContent = countLines(t).toLocaleString();
  }

  function updateOutputStats(chars, lines) {
    outChars.textContent = chars.toLocaleString();
    outLines.textContent = lines.toLocaleString();
  }

  function setStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = type || '';
  }

  function setChips({ format_type, reduction_pct, trimmed_lines }) {
    // Format chip
    if (format_type) {
      formatChip.innerHTML = `<span class="status-chip chip-format">${escHtml(format_type)}</span>`;
    } else {
      formatChip.innerHTML = '';
    }

    // Reduction chip
    if (reduction_pct !== undefined && reduction_pct !== null) {
      let cls = 'chip-reduction';
      let label = '';
      if (reduction_pct > 0) {
        label = `↓ ${reduction_pct}% smaller`;
      } else if (reduction_pct < 0) {
        cls += ' negative';
        label = `↑ ${Math.abs(reduction_pct)}% larger (wrapper added)`;
      } else {
        cls += ' neutral';
        label = 'no change';
      }
      reductionChip.innerHTML = `<span class="status-chip ${cls}">${label}</span>`;
    } else {
      reductionChip.innerHTML = '';
    }

    // Trimmed chip
    if (trimmed_lines && trimmed_lines > 0) {
      trimmedChip.innerHTML = `<span class="status-chip chip-trimmed">✂ ${trimmed_lines} lines trimmed</span>`;
    } else {
      trimmedChip.innerHTML = '';
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setLoading(on) {
    spinner.style.display = on ? 'block' : 'none';
    processBtn.disabled = on;
  }

  // ── Process ───────────────────────────────────────────────────────────
  async function processInput() {
    const text = inputArea.value;
    if (!text.trim()) {
      setStatus('Nothing to process — paste some text first.', '');
      return;
    }

    setLoading(true);
    setStatus('Processing…', '');

    try {
      const resp = await fetch('/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      if (!resp.ok) {
        throw new Error(`Server error: ${resp.status}`);
      }

      const data = await resp.json();
      outputArea.value = data.output || '';
      updateOutputStats(data.output_chars || 0, data.output_lines || 0);
      setChips(data);
      setStatus('Done.', 'success');

    } catch (err) {
      setStatus(`Error: ${err.message}`, 'error');
    } finally {
      setLoading(false);
    }
  }

  // ── Copy to clipboard ─────────────────────────────────────────────────
  async function copyOutput() {
    const text = outputArea.value;
    if (!text) {
      setStatus('Nothing to copy.', '');
      return;
    }
    try {
      await navigator.clipboard.writeText(text);
      const orig = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copy-feedback');
      setTimeout(() => {
        copyBtn.textContent = orig;
        copyBtn.classList.remove('copy-feedback');
      }, 1600);
      setStatus('Copied to clipboard.', 'success');
    } catch (err) {
      // Fallback: execCommand
      outputArea.select();
      document.execCommand('copy');
      setStatus('Copied (fallback).', 'success');
    }
  }

  // ── Clear ─────────────────────────────────────────────────────────────
  function clearAll() {
    inputArea.value = '';
    outputArea.value = '';
    updateInputStats();
    updateOutputStats(0, 0);
    setChips({});
    setStatus('Cleared.', '');
    formatChip.innerHTML = '';
    reductionChip.innerHTML = '';
    trimmedChip.innerHTML = '';
    inputArea.focus();
  }

  // ── Events ────────────────────────────────────────────────────────────
  inputArea.addEventListener('input', updateInputStats);

  processBtn.addEventListener('click', processInput);
  copyBtn.addEventListener('click', copyOutput);
  clearBtn.addEventListener('click', clearAll);

  // Ctrl+Enter / Cmd+Enter to process
  inputArea.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      processInput();
    }
  });

  // ── Tab key → insert spaces (not lose focus) ──────────────────────────
  inputArea.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = e.target.selectionStart;
      const end   = e.target.selectionEnd;
      e.target.value = e.target.value.substring(0, start) + '  ' + e.target.value.substring(end);
      e.target.selectionStart = e.target.selectionEnd = start + 2;
      updateInputStats();
    }
  });

  // Initial stats
  updateInputStats();
})();
</script>
</body>
</html>
