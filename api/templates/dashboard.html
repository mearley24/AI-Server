<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Symphony</title>
<style>
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1c1c1c;
    --border: #262626; --text: #cdccca; --dim: #797876; --faint: #5a5957;
    --teal: #4f98a3; --teal-dim: rgba(79,152,163,0.12);
    --green: #6daa45; --green-dim: rgba(109,170,69,0.12);
    --red: #dd6974; --red-dim: rgba(221,105,116,0.12);
    --amber: #bb653b; --amber-dim: rgba(187,101,59,0.12);
    --purple: #a86fdf; --purple-dim: rgba(168,111,223,0.12);
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, 'SF Pro Text', sans-serif;
    background: var(--bg); color: var(--text);
    padding: env(safe-area-inset-top) 0 80px;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }
  a { color: var(--teal); text-decoration: none; }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,13,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: env(safe-area-inset-top) 16px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 {
    font-size: 1.25rem; font-weight: 700; letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--teal), #7cc4d0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .pulse {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-glow 2s ease-in-out infinite;
  }
  .pulse.warn { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .pulse.dead { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }
  @keyframes pulse-glow {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .status-label { font-size: 0.7rem; color: var(--dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 0; padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 52px; z-index: 90;
  }
  .tab {
    flex: 1; padding: 12px 0; text-align: center;
    font-size: 0.8rem; font-weight: 600; color: var(--dim);
    border: none; background: none; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .tab .badge {
    display: inline-block; min-width: 18px; height: 18px;
    line-height: 18px; border-radius: 9px; font-size: 0.65rem;
    font-weight: 700; text-align: center; margin-left: 4px;
    padding: 0 5px;
  }
  .tab .badge.pending { background: var(--amber); color: #000; }
  .tab .badge.count { background: var(--border); color: var(--dim); }

  /* ── Tab panels ── */
  .panel { display: none; padding: 12px 16px; }
  .panel.active { display: block; }

  /* ── KPI strip ── */
  .kpi-strip {
    display: flex; gap: 8px; padding: 12px 16px;
    overflow-x: auto; scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .kpi-strip::-webkit-scrollbar { display: none; }
  .kpi {
    flex: 0 0 auto; min-width: 110px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
    scroll-snap-align: start;
  }
  .kpi-label { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .kpi-value { font-size: 1.3rem; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .kpi-sub { font-size: 0.65rem; color: var(--faint); margin-top: 2px; }

  /* ── Feed cards ── */
  .feed { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    transition: transform 0.25s, opacity 0.25s;
    position: relative; overflow: hidden;
  }
  .card.swiped { transform: translateX(100%); opacity: 0; pointer-events: none; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-meta { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .card-type {
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 2px 6px; border-radius: 4px;
    white-space: nowrap;
  }
  .type-build { background: var(--teal-dim); color: var(--teal); }
  .type-alpha { background: var(--green-dim); color: var(--green); }
  .type-tool { background: var(--purple-dim); color: var(--purple); }
  .type-info { background: var(--border); color: var(--dim); }
  .type-research { background: var(--amber-dim); color: var(--amber); }
  .card-author {
    font-size: 0.75rem; font-weight: 600; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-time { font-size: 0.65rem; color: var(--faint); white-space: nowrap; }
  .card-relevance {
    font-size: 0.7rem; font-weight: 700; padding: 2px 7px;
    border-radius: 4px; font-variant-numeric: tabular-nums;
  }
  .rel-high { background: var(--green-dim); color: var(--green); }
  .rel-mid { background: var(--amber-dim); color: var(--amber); }
  .rel-low { background: var(--red-dim); color: var(--red); }
  .card-summary {
    font-size: 0.82rem; line-height: 1.45; color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden; margin-bottom: 10px;
  }
  .card-summary.expanded { -webkit-line-clamp: unset; }
  .card-action-label {
    font-size: 0.7rem; color: var(--teal); font-weight: 600;
    margin-bottom: 10px;
  }
  .card-actions { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 10px 0; border-radius: var(--radius-sm);
    font-size: 0.8rem; font-weight: 700; border: none; cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); }
  .btn-approve { background: var(--green); color: #000; }
  .btn-approve:hover { background: #7dba55; }
  .btn-dismiss { background: var(--surface2); color: var(--dim); border: 1px solid var(--border); }
  .btn-dismiss:hover { background: var(--border); }
  .btn-expand {
    background: none; border: none; color: var(--teal); font-size: 0.75rem;
    font-weight: 600; cursor: pointer; padding: 4px 0; margin-bottom: 6px;
  }

  /* ── Memory cards ── */
  .memory-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
  }
  .memory-cat {
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--teal); margin-bottom: 4px;
  }
  .memory-text { font-size: 0.8rem; line-height: 1.4; color: var(--text); }
  .memory-time { font-size: 0.65rem; color: var(--faint); margin-top: 4px; }

  /* ── Services grid ── */
  .svc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .svc {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .svc-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .svc-dot.up { background: var(--green); }
  .svc-dot.down { background: var(--red); }
  .svc-name { font-size: 0.75rem; font-weight: 600; }
  .svc-port { font-size: 0.65rem; color: var(--faint); }

  /* ── Empty state ── */
  .empty {
    text-align: center; padding: 48px 24px; color: var(--dim);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.3; }
  .empty-text { font-size: 0.85rem; line-height: 1.5; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 20px;
    font-size: 0.8rem; font-weight: 600; color: var(--text);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; }

  /* ── Refresh animation ── */
  .refreshing .kpi-value { animation: shimmer 1.2s infinite; }
  @keyframes shimmer {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* ── Section headers ── */
  .section-title {
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--dim); margin: 16px 0 8px;
  }
</style>
</head><body>

<!-- Header -->
<div class="header">
  <h1>Symphony</h1>
  <div class="header-right">
    <span class="status-label" id="statusLabel">loading</span>
    <div class="pulse" id="statusPulse"></div>
  </div>
</div>

<!-- KPI Strip -->
<div class="kpi-strip" id="kpiStrip">
  <div class="kpi"><div class="kpi-label">Memories</div><div class="kpi-value" id="kpiMemories">--</div><div class="kpi-sub">cortex total</div></div>
  <div class="kpi"><div class="kpi-label">Pending</div><div class="kpi-value" id="kpiPending" style="color:var(--amber)">--</div><div class="kpi-sub">needs review</div></div>
  <div class="kpi"><div class="kpi-label">Approved</div><div class="kpi-value" id="kpiApproved" style="color:var(--green)">--</div><div class="kpi-sub">human + auto</div></div>
  <div class="kpi"><div class="kpi-label">Services</div><div class="kpi-value" id="kpiServices">--</div><div class="kpi-sub" id="kpiServicesLabel">containers</div></div>
  <div class="kpi"><div class="kpi-label">Trading</div><div class="kpi-value" id="kpiTrading">--</div><div class="kpi-sub" id="kpiTradingLabel">status</div></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="review">Review <span class="badge pending" id="tabPendingBadge">0</span></button>
  <button class="tab" data-tab="memories">Memories <span class="badge count" id="tabMemBadge">0</span></button>
  <button class="tab" data-tab="system">System</button>
</div>

<!-- Review Panel -->
<div class="panel active" id="panel-review">
  <div class="feed" id="reviewFeed"></div>
</div>

<!-- Memories Panel -->
<div class="panel" id="panel-memories">
  <div class="feed" id="memoriesFeed"></div>
</div>

<!-- System Panel -->
<div class="panel" id="panel-system">
  <div class="section-title">Services</div>
  <div class="svc-grid" id="svcGrid"></div>
  <div class="section-title" style="margin-top:20px">Queue Stats</div>
  <div id="queueStats"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  const BASE = '';
  let allQueueItems = [];
  let refreshTimer = null;

  // ── Tabs ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── Toast ──
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── Time formatting ──
  function timeAgo(ts) {
    if (!ts) return '';
    const sec = Math.floor(Date.now()/1000 - ts);
    if (sec < 60) return 'just now';
    if (sec < 3600) return Math.floor(sec/60) + 'm ago';
    if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
    return Math.floor(sec/86400) + 'd ago';
  }

  // ── Type badge class ──
  function typeClass(t) {
    const map = { build:'type-build', alpha:'type-alpha', tool:'type-tool', research:'type-research' };
    return map[t] || 'type-info';
  }
  function relClass(r) {
    if (r >= 70) return 'rel-high';
    if (r >= 40) return 'rel-mid';
    return 'rel-low';
  }

  // ── Build review card ──
  function reviewCard(item) {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.id = item.id;

    const summary = item.summary || 'No summary available';
    const isLong = summary.length > 180;

    div.innerHTML = `
      <div class="card-header">
        <div class="card-meta">
          <span class="card-type ${typeClass(item.post_type)}">${item.post_type || 'info'}</span>
          <span class="card-author">${item.author ? '@' + item.author : 'unknown'}</span>
        </div>
        <span class="card-relevance ${relClass(item.relevance)}">${item.relevance}</span>
      </div>
      <div class="card-summary${isLong ? '' : ' expanded'}">${summary}</div>
      ${isLong ? '<button class="btn-expand" onclick="this.previousElementSibling.classList.toggle(\'expanded\'); this.textContent = this.textContent === \'Show more\' ? \'Show less\' : \'Show more\'">Show more</button>' : ''}
      ${item.action && item.action !== 'none' ? '<div class="card-action-label">Suggested: ' + item.action + '</div>' : ''}
      <div class="card-actions">
        <button class="btn btn-approve" onclick="handleAction(${item.id}, 'approve', this)">Approve</button>
        <button class="btn btn-dismiss" onclick="handleAction(${item.id}, 'reject', this)">Dismiss</button>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px">
        <span class="card-time">${timeAgo(item.created_at)}</span>
        ${item.url ? '<a href="'+item.url+'" target="_blank" style="font-size:0.7rem">View post</a>' : ''}
      </div>
    `;
    return div;
  }

  // ── Handle approve/dismiss ──
  window.handleAction = async function(id, action, btn) {
    const card = btn.closest('.card');
    try {
      const r = await fetch(BASE + '/proxy/x-intake/queue/' + id + '/' + action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      });
      if (r.ok) {
        card.classList.add('swiped');
        toast(action === 'approve' ? 'Approved \u2014 Bob will learn from this' : 'Dismissed');
        setTimeout(() => card.remove(), 300);
        // Update badge
        const badge = document.getElementById('tabPendingBadge');
        const cur = parseInt(badge.textContent) || 0;
        if (cur > 0) badge.textContent = cur - 1;
        if (cur <= 1) badge.textContent = '0';
      } else {
        toast('Failed \u2014 try again');
      }
    } catch(e) {
      toast('Network error');
    }
  };

  // ── Build memory card ──
  function memoryCard(mem) {
    const div = document.createElement('div');
    div.className = 'memory-card';
    div.innerHTML = `
      <div class="memory-cat">${mem.category || 'general'}</div>
      <div class="memory-text">${mem.content || mem.text || mem.summary || JSON.stringify(mem).slice(0,300)}</div>
      <div class="memory-time">${mem.created_at ? timeAgo(mem.created_at) : ''}</div>
    `;
    return div;
  }

  // ── Render services ──
  function renderServices(services) {
    const grid = document.getElementById('svcGrid');
    grid.innerHTML = '';
    for (const [name, info] of Object.entries(services || {})) {
      const svc = document.createElement('div');
      svc.className = 'svc';
      svc.innerHTML = `
        <div class="svc-dot ${info.status === 'healthy' ? 'up' : 'down'}"></div>
        <div>
          <div class="svc-name">${name}</div>
          <div class="svc-port">:${info.port}</div>
        </div>
      `;
      grid.appendChild(svc);
    }
  }

  // ── Render queue stats ──
  function renderQueueStats(stats) {
    const el = document.getElementById('queueStats');
    if (!stats) { el.innerHTML = '<div class="empty"><div class="empty-text">No queue data</div></div>'; return; }
    el.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="kpi"><div class="kpi-label">Pending</div><div class="kpi-value" style="color:var(--amber)">${stats.pending||0}</div></div>
        <div class="kpi"><div class="kpi-label">Auto-approved</div><div class="kpi-value" style="color:var(--green)">${stats.auto_approved||0}</div></div>
        <div class="kpi"><div class="kpi-label">Approved</div><div class="kpi-value" style="color:var(--green)">${stats.approved||0}</div></div>
        <div class="kpi"><div class="kpi-label">Rejected</div><div class="kpi-value" style="color:var(--red)">${stats.rejected||0}</div></div>
        <div class="kpi"><div class="kpi-label">Auto-rejected</div><div class="kpi-value" style="color:var(--faint)">${stats.auto_rejected||0}</div></div>
        <div class="kpi"><div class="kpi-label">Total</div><div class="kpi-value">${stats.total||0}</div></div>
      </div>
    `;
  }

  // ── Fetch everything ──
  async function fetchAll() {
    document.body.classList.add('refreshing');
    try {
      // Parallel fetches
      const [dashRes, queueRes, queueStatsRes, memoriesRes] = await Promise.all([
        fetch(BASE + '/api/dashboard-data').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch(BASE + '/proxy/x-intake/queue?status=pending&limit=50').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch(BASE + '/proxy/x-intake/queue/stats').then(r => r.ok ? r.json() : null).catch(() => null),
        fetch(BASE + '/proxy/cortex/memories?limit=20').then(r => r.ok ? r.json() : null).catch(() => null),
      ]);

      // KPIs
      if (dashRes) {
        document.getElementById('kpiMemories').textContent = dashRes.cortex?.memory_count ?? '--';
        const svcCount = Object.keys(dashRes.services || {}).length;
        const healthyCount = Object.values(dashRes.services || {}).filter(s => s.status === 'healthy').length;
        document.getElementById('kpiServices').textContent = healthyCount + '/' + svcCount;
        document.getElementById('kpiServicesLabel').textContent = healthyCount === svcCount ? 'all healthy' : (svcCount - healthyCount) + ' down';

        // Status pulse
        const pulse = document.getElementById('statusPulse');
        const label = document.getElementById('statusLabel');
        if (healthyCount === svcCount) {
          pulse.className = 'pulse'; label.textContent = 'all systems go';
        } else if (healthyCount > svcCount * 0.7) {
          pulse.className = 'pulse warn'; label.textContent = 'degraded';
        } else {
          pulse.className = 'pulse dead'; label.textContent = 'critical';
        }

        // Trading
        const t = dashRes.trading || {};
        if (t.status === 'offline' || !t.status || t.status === 'unknown') {
          document.getElementById('kpiTrading').textContent = 'OFF';
          document.getElementById('kpiTrading').style.color = 'var(--red)';
          document.getElementById('kpiTradingLabel').textContent = 'offline';
        } else {
          document.getElementById('kpiTrading').textContent = t.balance ? '$' + parseFloat(t.balance).toFixed(0) : 'ON';
          document.getElementById('kpiTrading').style.color = 'var(--green)';
          document.getElementById('kpiTradingLabel').textContent = t.pnl ? 'P&L: $' + parseFloat(t.pnl).toFixed(2) : 'active';
        }

        renderServices(dashRes.services);
      }

      // Queue stats
      if (queueStatsRes) {
        const pending = queueStatsRes.pending || 0;
        const approved = (queueStatsRes.approved || 0) + (queueStatsRes.auto_approved || 0);
        document.getElementById('kpiPending').textContent = pending;
        document.getElementById('kpiApproved').textContent = approved;
        document.getElementById('tabPendingBadge').textContent = pending;
        if (pending === 0) document.getElementById('tabPendingBadge').className = 'badge count';
        else document.getElementById('tabPendingBadge').className = 'badge pending';
        renderQueueStats(queueStatsRes);
      }

      // Review feed
      const feed = document.getElementById('reviewFeed');
      const items = (queueRes && queueRes.items) || [];
      if (items.length === 0) {
        feed.innerHTML = '<div class="empty"><div class="empty-icon">&#10003;</div><div class="empty-text">Nothing to review right now.<br>Bob is scanning \u2014 items will appear here.</div></div>';
      } else {
        feed.innerHTML = '';
        items.forEach(item => feed.appendChild(reviewCard(item)));
      }

      // Memories feed
      const memFeed = document.getElementById('memoriesFeed');
      const mems = Array.isArray(memoriesRes) ? memoriesRes : (memoriesRes?.memories || []);
      document.getElementById('tabMemBadge').textContent = mems.length;
      if (mems.length === 0) {
        memFeed.innerHTML = '<div class="empty"><div class="empty-icon">&#9673;</div><div class="empty-text">No memories yet.<br>Cortex stores knowledge as scanners find it.</div></div>';
      } else {
        memFeed.innerHTML = '';
        mems.forEach(m => memFeed.appendChild(memoryCard(m)));
      }

    } catch(e) {
      console.error('fetch error', e);
    }
    document.body.classList.remove('refreshing');
  }

  // ── Pull-to-refresh (basic) ──
  let touchStartY = 0;
  document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
  document.addEventListener('touchend', e => {
    if (window.scrollY === 0 && e.changedTouches[0].clientY - touchStartY > 80) {
      toast('Refreshing...');
      fetchAll();
    }
  });

  // ── Init ──
  fetchAll();
  refreshTimer = setInterval(fetchAll, 30000);
})();
</script>
</body></html>
